<style>

  --green:#00e676;--green-dim:rgba(0,230,118,0.12);
  --red:#ff4444;--red-dim:rgba(255,68,68,0.12);
  --yellow:#ffbb00;--yellow-dim:rgba(255,187,0,0.12);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.12);
  --purple:#aa66ff;--purple-dim:rgba(170,102,255,0.12);

}
body.light-theme{
  --bg:#f4f4f0;--surface:#ffffff;--card:#fafafa;--border:#e0e0e0;--border2:#d0d0d0;
  --text:#1a1a1a;--muted:#666;--muted2:#999;
  --accent:#5a9e00;--accent-dim:rgba(90,158,0,0.1);
  --green:#00a050;--green-dim:rgba(0,160,80,0.12);
  --red:#cc2222;--red-dim:rgba(204,34,34,0.12);
  --yellow:#cc8800;--yellow-dim:rgba(204,136,0,0.12);
  --blue:#2266cc;--blue-dim:rgba(34,102,204,0.12);
  --purple:#7733cc;--purple-dim:rgba(119,51,204,0.12);
  --orange:#cc5500;--orange-dim:rgba(204,85,0,0.12);
  --pink:#cc3377;--pink-dim:rgba(204,51,119,0.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loader.out{opacity:0;pointer-events:none}
.ld-logo{width:80px;height:80px;object-fit:contain;margin-bottom:20px;animation:ldpulse 1.4s ease-in-out infinite}
.ld-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;margin-bottom:24px;color:var(--text)}
.ld-bar{width:180px;height:2px;background:var(--border2);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--accent);animation:ldfill 1.6s ease forwards}
@keyframes ldpulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ldfill{from{width:0}to{width:100%}}
#login-page{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse 70% 50% at 80% 10%,rgba(212,255,0,.06) 0,transparent 60%),
             radial-gradient(ellipse 50% 70% at 5% 90%,rgba(77,159,255,.05) 0,transparent 60%),var(--bg)}
.lc{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.3)}
.lc-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.lc-logo img{width:48px;height:48px;object-fit:contain;border-radius:10px}
.lc-brand{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.1}
.lc-brand small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase}
.lc h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:4px}
.lc p{color:var(--muted);font-size:13px;margin-bottom:28px}
.fg{margin-bottom:14px}

.fi,.fs,.fta{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent)}
.fs option{background:var(--surface)}
.fta{resize:vertical;min-height:76px}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fl{display:block;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.alert.show{display:block}
.alert-err{background:var(--red-dim);border:1px solid rgba(255,68,68,.3);color:var(--red)}
.alert-ok{background:var(--green-dim);border:1px solid rgba(0,230,118,.3);color:var(--green)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;text-decoration:none;white-space:nowrap}
.btn-p{background:var(--accent);color:#000}.btn-p:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-d{background:var(--red);color:#fff}.btn-d:hover{filter:brightness(1.1)}
.btn-g{background:transparent;color:var(--text);border:1px solid var(--border2)}.btn-g:hover{border-color:var(--accent);color:var(--accent)}
.btn-gr{background:var(--green);color:#000}.btn-gr:hover{filter:brightness(1.1)}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-w{width:100%}
.btn-yw{background:var(--yellow);color:#000}
.btn-or{background:var(--orange);color:#fff}
.btn-pu{background:var(--purple);color:#fff}
.btn-bl{background:var(--blue);color:#fff}
.btn-pk{background:var(--pink);color:#fff}
#app{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sw);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transition:transform .28s;overflow:hidden}
.sb-head{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo{width:36px;height:36px;object-fit:contain;border-radius:8px;flex-shrink:0}
.sb-brand{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.8px;line-height:1.2}
.sb-brand small{display:block;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.sb-user{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}

.un{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ur{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;display:inline-block;margin-top:2px}
.r-admin{background:var(--purple-dim);color:var(--purple)}
.r-coordinator{background:var(--blue-dim);color:var(--blue)}
.r-coordinatorhead{background:var(--orange-dim);color:var(--orange)}
.r-trainer{background:var(--green-dim);color:var(--green)}
.r-client{background:var(--yellow-dim);color:var(--yellow)}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.sb-nav::-webkit-scrollbar{width:4px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.nav-sec{padding:0 16px;margin-top:4px}
.nav-sec-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:8px 0 4px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-left:2px solid transparent;transition:all .15s}
.ni:hover{background:rgba(128,128,128,.08);color:var(--text)}
.ni.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent)}
.ni-ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-foot{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.main{margin-left:var(--sw);flex:1;min-height:100vh;background:var(--bg)}
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;position:sticky;top:0;z-index:50;gap:14px}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;flex:1}
.tb-date{font-size:12px;color:var(--muted)}
.notif-btn,.theme-btn{background:transparent;border:1px solid var(--border2);border-radius:7px;padding:7px 9px;cursor:pointer;color:var(--text);font-size:14px;transition:border-color .2s;position:relative}
.notif-btn:hover,.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.ndot{position:absolute;top:5px;right:5px;width:6px;height:6px;background:var(--red);border-radius:50%}
.mob-menu{display:none;background:transparent;border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:7px;cursor:pointer;font-size:17px}
.page{padding:22px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:700;letter-spacing:.3px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:18px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc-a::before{background:var(--accent)}.sc-g::before{background:var(--green)}.sc-r::before{background:var(--red)}.sc-b::before{background:var(--blue)}.sc-p::before{background:var(--purple)}.sc-y::before{background:var(--yellow)}.sc-o::before{background:var(--orange)}
.sc-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.sc-val{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1}
.sc-sub{font-size:11px;color:var(--muted);margin-top:3px}
.sc-ico{position:absolute;right:14px;top:14px;font-size:24px;opacity:.12}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 13px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:rgba(128,128,128,.04)}
tbody td{padding:11px 13px;border-bottom:1px solid rgba(128,128,128,.06);vertical-align:middle}
tbody tr:hover{background:rgba(128,128,128,.04)}
tbody tr:last-child td{border-bottom:none}
.td-actions{display:flex;gap:5px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.b-g{background:var(--green-dim);color:var(--green)}.b-y{background:var(--yellow-dim);color:var(--yellow)}.b-r{background:var(--red-dim);color:var(--red)}.b-b{background:var(--blue-dim);color:var(--blue)}.b-p{background:var(--purple-dim);color:var(--purple)}.b-gray{background:rgba(128,128,128,.12);color:var(--muted)}.b-a{background:var(--accent-dim);color:var(--accent)}.b-o{background:var(--orange-dim);color:var(--orange)}.b-pk{background:var(--pink-dim);color:var(--pink)}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.dot-g{background:var(--green);animation:blink 1.4s infinite}.dot-y{background:var(--yellow)}.dot-r{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(3px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.mb{background:var(--card);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:26px;animation:moslide .2s ease}
.mb-lg{max-width:760px}.mb-xl{max-width:960px}
@keyframes moslide{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mo-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.mo-x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:3px;transition:color .2s}
.mo-x:hover{color:var(--text)}
.mo-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.4}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--muted)}
.empty-sub{font-size:13px;color:var(--muted2);margin-bottom:20px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;color:var(--muted)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;min-width:260px;max-width:360px;display:flex;align-items:center;gap:9px;font-size:13px;animation:tslide .25s ease;box-shadow:0 6px 24px rgba(0,0,0,.3)}
.toast-ok{border-left:3px solid var(--green)}.toast-err{border-left:3px solid var(--red)}.toast-info{border-left:3px solid var(--blue)}.toast-warn{border-left:3px solid var(--yellow)}
@keyframes tslide{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.chart-box{position:relative;height:210px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:18px}
.chat-layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 104px);gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--card)}
.chat-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.chat-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.chat-list{flex:1;overflow-y:auto}
.chat-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid rgba(128,128,128,.05);transition:background .15s;display:flex;align-items:center;gap:10px;position:relative}
.chat-item:hover{background:rgba(128,128,128,.06)}
.chat-item.active{background:var(--accent-dim);border-left:2px solid var(--accent)}
.chat-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-main{display:flex;flex-direction:column;background:var(--bg)}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface)}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:68%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.msg-out{align-self:flex-end;background:var(--accent);color:#000;border-bottom-right-radius:4px}
.msg-in{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-meta{font-size:10px;margin-top:4px;opacity:.6;text-align:right}
.msg-in .msg-meta{text-align:left}
.chat-input-area{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface);align-items:flex-end}
.chat-input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:none;min-height:40px;max-height:120px;line-height:1.4}
.chat-input:focus{border-color:var(--accent)}
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:16px}
.slot-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .2s,background .2s}
.slot-card:hover{border-color:var(--border2)}
.slot-card.booked-me{border-color:var(--accent);background:var(--accent-dim)}
.slot-card.full-card{border-color:rgba(255,68,68,.3)}
.slot-time{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--accent)}
.slot-trainer{font-size:12px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px}
.slot-tag{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;display:inline-block;margin-top:6px}
.slot-tag-f{background:var(--purple-dim);color:var(--purple)}
.slot-enrolled-list{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;max-height:140px;overflow-y:auto}
.slot-enrolled-list::-webkit-scrollbar{width:3px}
.slot-enrolled-list::-webkit-scrollbar-thumb{background:var(--border2)}
.slot-client-row{display:flex;align-items:center;gap:7px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.slot-client-av{width:22px;height:22px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.slot-client-name{font-size:12px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-rm-btn{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.2);border-radius:5px;padding:2px 7px;color:var(--red);font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0;transition:all .15s}
.slot-rm-btn:hover{background:var(--red);color:#fff}
.pb-wrap{margin-bottom:10px}
.pb-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.pb{height:5px;background:var(--border2);border-radius:3px;overflow:hidden}

<script>
'use strict';
const PLANS=['Silver','Gold','Platinum','Platinum Plus','Couple','Corporate Fitness'];
const SESSION_TYPES=['Batch Session','One on One','Corporate Fitness','Couple Training','Strength Training','Cardio','HIIT','Yoga','CrossFit','Pilates','Zumba','Rehabilitation','General Fitness'];
const COUNTRIES=['Afghanistan','Albania','Algeria','Argentina','Australia','Austria','Bahrain','Bangladesh','Belgium','Brazil','Canada','Chile','China','Colombia','Croatia','Czech Republic','Denmark','Egypt','Ethiopia','Finland','France','Germany','Ghana','Greece','Hungary','India','Indonesia','Iran','Iraq','Ireland','Israel','Italy','Japan','Jordan','Kenya','Kuwait','Lebanon','Malaysia','Mexico','Morocco','Netherlands','New Zealand','Nigeria','Norway','Oman','Pakistan','Peru','Philippines','Poland','Portugal','Qatar','Romania','Russia','Saudi Arabia','Singapore','South Africa','South Korea','Spain','Sri Lanka','Sweden','Switzerland','Thailand','Turkey','UAE','Uganda','Ukraine','United Kingdom','United States','Vietnam','Zimbabwe'];
const RATING_CRITERIA=[
  {id:'punctuality',label:'Punctuality',icon:'⏰',desc:'On time for sessions'},
  {id:'technique',label:'Technique',icon:'💪',desc:'Correct form & guidance'},
  {id:'communication',label:'Communication',icon:'🗣',desc:'Clear & motivating'},
  {id:'clientProgress',label:'Client Progress',icon:'📈',desc:'Results & improvement'},
  {id:'professionalism',label:'Professionalism',icon:'🎯',desc:'Conduct & attitude'},
];
const LEAVE_REASONS=['Personal Emergency','Medical Leave','Family Emergency','Planned Vacation','Other'];
let CU=null,CR=null,CH={};
let _chatUnsub=null,_notifUnsub=null,_notifCheckTimer=null,_midnightTimer=null;
let _notifications=[];
const TC_RESET_KEY='gyh_tc_last_reset';
const REMINDED_KEY='gyh_reminded_sessions';
function getTodayStr(){return new Date().toISOString().split('T')[0];}
async function doTcDailyReset(){
  const today=getTodayStr(),last=localStorage.getItem(TC_RESET_KEY);
  if(last===today)return;
  try{
    const entries=await fsGetAll('timechart');
    const toReset=entries.filter(e=>e.todayStatus&&e.todayStatus!=='not-started'&&e.lastStatusUpdate!==today);
    await Promise.all(toReset.map(e=>fsUpdate('timechart',e.id,{todayStatus:'not-started',lastStatusUpdate:today})));
    localStorage.setItem(TC_RESET_KEY,today);
    if(toReset.length>0)toast(`📋 Time Chart reset for ${today}`,'info');
  }catch(e){console.warn('[TC Reset]',e);}
}
function scheduleMidnightReset(){
  if(_midnightTimer){clearTimeout(_midnightTimer);_midnightTimer=null;}
  const now=new Date(),next=new Date(now);
  next.setHours(24,0,0,500);
  _midnightTimer=setTimeout(async()=>{await doTcDailyReset();scheduleMidnightReset();},next-now);
}
function getReminderSet(){try{return new Set(JSON.parse(localStorage.getItem(REMINDED_KEY)||'[]'));}catch{return new Set();}}
function addToReminderSet(key){
  const s=getReminderSet();s.add(key);
  const today=getTodayStr();const fresh=[...s].filter(k=>k.includes(today));
  localStorage.setItem(REMINDED_KEY,JSON.stringify(fresh));
}
function showReminderToast(title,body,onJoin){
  document.querySelectorAll('.reminder-toast').forEach(r=>r.remove());
  const div=document.createElement('div');div.className='reminder-toast';
  div.innerHTML=`<button class="reminder-toast-close" onclick="this.parentElement.remove()">✕</button>
    <div class="reminder-toast-title">⏰ ${title}</div>
    <div class="reminder-toast-body">${body}</div>
    ${onJoin?`<button class="btn btn-p btn-sm" style="margin-top:10px" onclick="${onJoin}">Join Session 🔗</button>`:''}`;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),30000);
}
async function checkUpcomingSessions(){
  if(!CU||!CR)return;
  try{
    const now=new Date(),today=getTodayStr();
    let sessions=[];
    if(CR==='trainer'){sessions=await fsGetAll('sessions',fn().where('trainerId','==',auth().currentUser.uid),fn().where('date','==',today),fn().where('status','==','not-started'));}
    else if(CR==='coordinator'){const myUid=auth().currentUser.uid;const myClients=await fsGetAll('clients',fn().where('coordinatorId','==',myUid));const ids=myClients.map(c=>c.id);const allToday=await fsGetAll('sessions',fn().where('date','==',today),fn().where('status','==','not-started'));sessions=allToday.filter(s=>ids.includes(s.clientId));}
    else{sessions=await fsGetAll('sessions',fn().where('date','==',today),fn().where('status','==','not-started'));}
    let tcSessions=CR==='trainer'?await fsGetAll('timechart',fn().where('trainerId','==',auth().currentUser.uid)):await fsGetAll('timechart');
    const reminded=getReminderSet();
    const allItems=[...sessions.map(s=>({id:s.id,time:s.time,clientName:s.clientName,trainerName:s.trainerName,type:s.type,meetLink:s.meetLink||'',isTc:false})),...tcSessions.filter(t=>t.sessionTime).map(t=>({id:'tc_'+t.id,time:t.sessionTime,clientName:t.clientName,trainerName:t.trainerName,type:t.sessionType,meetLink:'',isTc:true}))];
    for(const s of allItems){
      if(!s.time)continue;
      const[h,m]=s.time.split(':').map(Number);if(isNaN(h)||isNaN(m))continue;
      const sessTime=new Date(now);sessTime.setHours(h,m,0,0);
      const diffMin=(sessTime-now)/60000;
      if(diffMin>55&&diffMin<=65){
        const rKey=`${s.id}_${today}_1hr`;
        if(!reminded.has(rKey)){
          addToReminderSet(rKey);
          showReminderToast('Session in 1 Hour',`${s.clientName||'Client'} with ${s.trainerName||'Trainer'} at ${to12h(s.time)} — ${s.type||'Session'}`,s.meetLink?`window.open('${s.meetLink}','_blank')`:'null');
          await createNotifForUsers({key:rKey,title:'⏰ Session Reminder — 1 Hour',body:`${s.clientName||'Client'} with ${s.trainerName||'Trainer'} at ${to12h(s.time)}`,type:'session_reminder',sessionId:s.id},[auth().currentUser.uid]);
          toast(`⏰ Reminder: ${s.clientName} at ${to12h(s.time)}`,'info');
        }
      }
    }
  }catch(e){console.warn('[Reminder]',e);}
}

// ── SUBMIT MISSED REASON — notifies admins + coord heads via chat & notification ──
async function submitMissedReasonPopup(sessionId,clientName,trainerName,date,time,reqId=''){
  const reasonSel=document.getElementById('mrp-reason-sel');const reason=reasonSel?reasonSel.value:'';
  if(!reason){toast('Please select a reason','error');return}
  const finalReason=reason==='Other'?(document.getElementById('mrp-other')?.value.trim()||'Other'):reason;
  const notes=document.getElementById('mrp-notes')?.value.trim()||'';
  const btn=document.querySelector('#missed-reason-overlay .btn-d');if(btn){btn.textContent='Saving…';btn.disabled=true;}
  try{
    // 1. Save the missed reason report
    await fsAdd('missedreasons',{
      sessionId,clientName,trainerName,date,time,
      reason:finalReason,notes,
      reportedBy:auth().currentUser.uid,
      reportedByName:CU.name||'',
      reportedByRole:CR
    });

    // 2. Mark the pending request as resolved
    if(reqId){
      try{await fsUpdate('missedreasonrequests',reqId,{resolved:true,resolvedBy:auth().currentUser.uid,resolvedByName:CU.name||''});}catch(e){}
    }

    // 3. Notify admins & coordinator heads — both in-app notification AND chat message
    const myUid=auth().currentUser.uid;
    const [admins,heads]=await Promise.all([
      fsGetAll('users',fn().where('role','==','admin')),
      fsGetAll('users',fn().where('role','==','coordinatorhead'))
    ]);
    const targets=[...admins,...heads].filter(u=>u.id!==myUid);
    const targetIds=targets.map(u=>u.id);

    const notifTitle=`📋 Missed Reason Submitted — ${clientName||'Client'}`;
    const notifBody=`${CU.name||'Coordinator'} submitted reason for missed session.\nClient: ${clientName||'—'} | Trainer: ${trainerName||'—'}\nDate: ${date||'—'} at ${to12h(time)}\nReason: ${finalReason}${notes?`\nNotes: ${notes}`:''}`;

    // In-app notifications
    if(targetIds.length){
      await createNotifForUsers({
        key:`missed_reason_submitted_${sessionId}_${Date.now()}`,
        title:notifTitle,
        body:notifBody,
        type:'missed_reason_submitted',
        sessionId
      },targetIds);
    }

    // Chat messages to each admin/coordinator head
    const chatMsg=`📋 MISSED REASON SUBMITTED\n\nClient: ${clientName||'—'}\nTrainer: ${trainerName||'—'}\nDate: ${date||'—'} at ${to12h(time)}\nReason: ${finalReason}${notes?`\nNotes: ${notes}`:''}\n\nSubmitted by: ${CU.name||'Coordinator'} (${CR})`;
    await Promise.all(targets.map(async u=>{
      const chatId=getChatId(myUid,u.id);
      try{
        await fn().addDoc(fn().collection(db(),`chats/${chatId}/messages`),{
          senderId:myUid,
          senderName:CU.name||CU.email||'',
          message:chatMsg,
          timestamp:fn().serverTimestamp(),
          read:false,
          type:'missed_reason_report'
        });
        await fn().setDoc(fn().doc(db(),'chats',chatId),{
          participants:[myUid,u.id],
          lastMessage:`📋 Missed Reason: ${clientName}`,
          lastMessageTime:fn().serverTimestamp(),
          lastSenderId:myUid
        },{merge:true});
      }catch(e){console.warn('Chat send failed for',u.id,e);}
    }));

    dismissMissedReasonPopup();
    toast('Reason submitted ✅ — Admins notified','success');
    if(document.querySelector('.ni.active')?.id==='ni-dash'){setTimeout(()=>dash(),300);}
  }catch(e){
    toast('Error: '+e.message,'error');
    if(btn){btn.textContent='⚠️ Submit Reason';btn.disabled=false;}
  }
}

function createAutocomplete(inputEl,items,opts={}){if(!inputEl)return;const wrap=inputEl.parentElement;if(!wrap.classList.contains('ac-wrap')){const w=document.createElement('div');w.className='ac-wrap';inputEl.parentNode.insertBefore(w,inputEl);w.appendChild(inputEl);}const acWrap=inputEl.parentElement;let dd=acWrap.querySelector('.ac-dropdown');if(!dd){dd=document.createElement('div');dd.className='ac-dropdown';acWrap.appendChild(dd);}let allItems=typeof items==='function'?[]:items;let selIdx=-1;const minChars=opts.minChars??1;async function refresh(){if(typeof items==='function')allItems=await items();}function show(filtered){selIdx=-1;if(!filtered.length){dd.innerHTML=`<div class="ac-no-results">No results found</div>`;}else{dd.innerHTML=filtered.map((it,i)=>`<div class="ac-item" data-idx="${i}" data-id="${it.id||''}" data-label="${(it.label||'').replace(/"/g,'&quot;')}"><span>${it.label||''}</span>${it.sub?`<span class="ac-item-sub">${it.sub}</span>`:''}</div>`).join('');dd.querySelectorAll('.ac-item').forEach(el=>{el.addEventListener('mousedown',e=>{e.preventDefault();const idx=parseInt(el.dataset.idx);selectItem(filtered[idx]);});});}dd.classList.add('open');}function hide(){dd.classList.remove('open');selIdx=-1;}function selectItem(it){inputEl.value=it.label||'';inputEl.dataset.selectedId=it.id||'';hide();if(opts.onSelect)opts.onSelect(it);}inputEl.addEventListener('focus',async()=>{await refresh();const v=inputEl.value.trim().toLowerCase();if(v.length>=minChars||minChars===0){const f=allItems.filter(it=>(it.label||'').toLowerCase().includes(v));show(f);}});inputEl.addEventListener('input',async()=>{await refresh();const v=inputEl.value.trim().toLowerCase();if(v.length<minChars){hide();return;}const f=allItems.filter(it=>(it.label||'').toLowerCase().includes(v)||(it.sub||'').toLowerCase().includes(v));show(f);});inputEl.addEventListener('keydown',e=>{const items2=dd.querySelectorAll('.ac-item');if(!dd.classList.contains('open'))return;if(e.key==='ArrowDown'){e.preventDefault();selIdx=Math.min(selIdx+1,items2.length-1);items2.forEach((el,i)=>el.classList.toggle('selected',i===selIdx));}else if(e.key==='ArrowUp'){e.preventDefault();selIdx=Math.max(selIdx-1,0);items2.forEach((el,i)=>el.classList.toggle('selected',i===selIdx));}else if(e.key==='Enter'&&selIdx>=0){e.preventDefault();items2[selIdx].dispatchEvent(new Event('mousedown'));}else if(e.key==='Escape'){hide();}});document.addEventListener('click',e=>{if(!acWrap.contains(e.target))hide();},true);return{refresh,hide};}

function listenForMissedRequests(){
  if(_missedReqUnsub){_missedReqUnsub();_missedReqUnsub=null;}
  try{
    const q=fn().query(fn().collection(db(),'missedreasonrequests'),fn().where('resolved','==',false));
    let initialLoad=true;const seenIds=new Set();
    _missedReqUnsub=fn().onSnapshot(q,snap=>{
      if(initialLoad){snap.forEach(d=>seenIds.add(d.id));initialLoad=false;return;}
      snap.docChanges().forEach(change=>{
        if(change.type==='added'){const data={id:change.doc.id,...change.doc.data()};if(seenIds.has(data.id))return;seenIds.add(data.id);
          if(data.assignedCoordIds&&data.assignedCoordIds.includes(CU.id)){setTimeout(()=>{showMissedReasonPopup(data.sessionId||'',data.clientName||'',data.trainerName||'',data.date||'',data.time||'',data.id);},800);}

    });

}

async function markSessionStatus(id,status,skipRatePrompt=false){
  if(id&&id.startsWith('tc_')){const tcId=id.replace('tc_','');await tcMarkStatus(tcId,status);return;}
  try{
    await fsUpdate('sessions',id,{status});toast(`Session marked: ${status}`,'success');
    if(status==='completed'&&!skipRatePrompt&&(CR==='coordinator'||CR==='coordinatorhead')){const sess=await fsGet('sessions',id);if(sess&&sess.trainerId&&sess.trainerName){showQuickRateOverlay(id,sess.trainerId,sess.trainerName,sess.type||'Session',sess.date||new Date().toISOString().split('T')[0]);}}
    if(status==='missed'){
      const sess=await fsGet('sessions',id);if(!sess)return;
      const myUid=auth().currentUser.uid;let assignedCoordIds=[];
      if(sess.clientId){const client=await fsGet('clients',sess.clientId);if(client&&client.coordinatorId){assignedCoordIds=[client.coordinatorId];}}
      const[heads,admins]=await Promise.all([fsGetAll('users',fn().where('role','==','coordinatorhead')),fsGetAll('users',fn().where('role','==','admin'))]);
      const allTargetIds=[...new Set([...assignedCoordIds,...heads.map(h=>h.id),...admins.map(a=>a.id)])];
      const reqRef=await fsAdd('missedreasonrequests',{sessionId:id,clientName:sess.clientName||'',trainerName:sess.trainerName||'',date:sess.date||'',time:sess.time||'',markedBy:myUid,markedByName:CU.name||'',assignedCoordIds:allTargetIds,resolved:false});
      const msgText=`⚠️ MISSED SESSION ALERT\nClient: ${sess.clientName||'—'}\nTrainer: ${sess.trainerName||'—'}\nTime: ${to12h(sess.time)} on ${sess.date}\nMarked by: ${CU.name||'System'}\n\nPlease follow up and log the reason.`;
      const chatPromises=allTargetIds.filter(uid=>uid!==myUid).map(async uid=>{const chatId=getChatId(myUid,uid);try{await fn().addDoc(fn().collection(db(),`chats/${chatId}/messages`),{senderId:myUid,senderName:CU.name||CU.email||'',message:msgText,timestamp:fn().serverTimestamp(),read:false,type:'missed_session_alert'});await fn().setDoc(fn().doc(db(),'chats',chatId),{participants:[myUid,uid],lastMessage:`⚠️ Missed: ${sess.clientName}`,lastMessageTime:fn().serverTimestamp(),lastSenderId:myUid},{merge:true});}catch(e){}});
      await Promise.all(chatPromises);
      await createNotifForUsers({key:`missed-${id}-${Date.now()}`,title:'⚠️ Session Missed',body:`${sess.clientName||'Client'} missed session with ${sess.trainerName||'Trainer'} at ${to12h(sess.time)} on ${sess.date}. Please enter the reason.`,type:'missed_session',sessionId:id,clientName:sess.clientName||'',requiresReason:true},allTargetIds);
      toast('📨 Coordinators notified via chat','info');
      if(CR==='coordinator'||CR==='coordinatorhead'){setTimeout(()=>{showMissedReasonPopup(id,sess.clientName||'',sess.trainerName||'',sess.date||'',sess.time||'',reqRef?reqRef.id:'');},500);}
    }
    const activePanel=document.querySelector('.ni.active')?.id?.replace('ni-','');
    if(activePanel==='dash')dash();else if(activePanel==='sessions')sessions();
  }catch(e){toast('Error: '+e.message,'error');}
}

function closeDotsAndScroll(headerId){document.querySelectorAll('.dots-dropdown').forEach(d=>d.classList.remove('open'));const el=document.getElementById(headerId);if(el){el.scrollIntoView({behavior:'smooth',block:'start'});const sectionId=headerId.replace('col-hd-','');const body=document.getElementById('col-body-'+sectionId);if(body&&!body.classList.contains('open')){toggleCollapsible(sectionId);}}}
function renderDashTodaySessions(todayS,tcVisible,canStart){
  const realClientIds=new Set(todayS.map(s=>s.clientId).filter(Boolean));

  const combined=[...todayS,...tcFiltered];combined.sort((a,b)=>(a.time||'').localeCompare(b.time||''));

function buildLeaderboard(trainers,allRatings,allClients){return trainers.map(t=>{const tRatings=allRatings.filter(r=>r.trainerId===t.id);const avg=tRatings.length?avgRating(tRatings):0;const tClients=allClients.filter(c=>c.trainerId===t.id).length;const criteriaAvg={};RATING_CRITERIA.forEach(c=>{const vals=tRatings.filter(r=>r.criteria&&r.criteria[c.id]).map(r=>r.criteria[c.id]);criteriaAvg[c.id]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;});return{...t,avg,totalRatings:tRatings.length,clientCount:tClients,criteriaAvg};}).sort((a,b)=>b.avg-a.avg||b.totalRatings-a.totalRatings);}

async function openRateTrainer(preTrainerId='',preTrainerName=''){
  const[allTrainers,sessions]=await Promise.all([fsGetAll('users',fn().where('role','==','trainer')),fsGetAll('sessions',fn().where('status','==','completed'))]);

></div><div class="mo-foot"><button class="btn btn-g" onclick="closeM2()">Cancel</button><button class="btn btn-p" onclick="saveTrainerRating()">Submit Rating</button></div>`);
  window._rtSessions=filteredSessions;window._rtCriteria={};RATING_CRITERIA.forEach(c=>window._rtCriteria[c.id]=0);window._rtSelectedRating=0;

function rtSetOverall(n){$('rt-rating').value=n;window._rtSelectedRating=n;const labels=['','😞 Poor','😐 Fair','🙂 Good','😊 Great','🌟 Excellent!'];const colors=['','#ff4444','#ff7700','var(--yellow)','#88cc00','var(--accent)'];const stars=$('rt-overall-stars'),lbl=$('rt-overall-label'),desc=$('rt-overall-desc');if(!stars)return;stars.querySelectorAll('.star-btn').forEach((b,i)=>{b.classList.toggle('active',i<n);b.style.color=i<n?colors[n]:'';});if(lbl){lbl.textContent=labels[n]||'';lbl.style.color=colors[n]||'var(--muted)';}const descs=['','Needs improvement','Below average','Meets expectations','Above average','Outstanding!'];if(desc)desc.textContent=descs[n]||'';}
function rtSetCriteria(cId,n){if(!window._rtCriteria)window._rtCriteria={};window._rtCriteria[cId]=n;const s=document.getElementById(`rt-crit-${cId}`);if(!s)return;s.querySelectorAll('.mini-star-btn').forEach((b,i)=>b.classList.toggle('active',i<n));}
function updateRatingSessionList(){const tid=$('rt-trainer').value;const sel=$('rt-session');if(!sel)return;const filtered=(window._rtSessions||[]).filter(s=>s.trainerId===tid);sel.innerHTML=`<option value="">— Select completed session —</option>`+filtered.slice(0,50).map(s=>`<option value="${s.id}" data-date="${s.date||''}" data-type="${s.type||''}">${s.clientName||'—'} • ${s.date||'—'} ${to12h(s.time)} (${s.type||'—'})</option>`).join('');sel.onchange=()=>{const opt=sel.options[sel.selectedIndex];if(opt&&opt.dataset.date)$('rt-date').value=opt.dataset.date;if(opt&&opt.dataset.type&&$('rt-type'))$('rt-type').value=opt.dataset.type;};}
async function saveTrainerRating(){const trainerId=$('rt-trainer').value;const rating=Number($('rt-rating').value||0);const trainerSel=$('rt-trainer');const trainerName=trainerId?trainerSel.options[trainerSel.selectedIndex].text:'';if(!trainerId||!rating){toast('Select trainer and give an overall rating','error');return}const sessionSel=$('rt-session');const sessionId=sessionSel?sessionSel.value:'';try{await fsAdd('trainerratings',{trainerId,trainerName,rating,criteria:window._rtCriteria||{},comment:$('rt-comment').value.trim(),sessionId,sessionType:$('rt-type').value,sessionDate:$('rt-date').value,ratedById:auth().currentUser.uid,ratedByName:CU.name||'',ratedByRole:CR});closeM2();toast('Rating submitted! 🌟','success');trainerratings();}catch(e){toast('Error: '+e.message,'error')}}
async function viewTrainerRatings(trainerId,trainerName){

se</button></div>`);

async function sessions(){
  $('page').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;
  let coordClientIds=null;
  if(CR==='coordinator'){const myUid=auth().currentUser.uid;const myClients=await fsGetAll('clients',fn().where('coordinatorId','==',myUid));coordClientIds=myClients.map(c=>c.id);}
  async function loadSTab(tab){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));const tabEl=document.querySelector(`.tab[data-stab="${tab}"]`);if(tabEl)tabEl.classList.add('active');
    $('sess-list').innerHTML=`<div style="padding:30px;text-align:center;color:var(--muted)"><div class="spin" style="width:22px;height:22px;margin:0 auto"></div></div>`;
    let q=[];if(CR==='trainer')q=[fn().where('trainerId','==',auth().currentUser.uid)];if(CR==='client')q=[fn().where('clientId','==',auth().currentUser.uid)];
    let data=await fsGetAll('sessions',...q);
    if(CR==='coordinator'&&coordClientIds){data=data.filter(s=>coordClientIds.includes(s.clientId));}
    const today=new Date();today.setHours(0,0,0,0);
    if(tab==='today')data=data.filter(s=>{const d=s.date?new Date(s.date):null;if(!d)return false;d.setHours(0,0,0,0);return d.getTime()===today.getTime()});
    else if(tab==='upcoming')data=data.filter(s=>{const d=s.date?new Date(s.date):null;if(!d)return false;d.setHours(0,0,0,0);return d.getTime()>today.getTime()});
    else if(tab==='past')data=data.filter(s=>{const d=s.date?new Date(s.date):null;if(!d)return false;d.setHours(0,0,0,0);return d.getTime()<today.getTime()});
    data.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||'').localeCompare(b.time||''));
    $('sess-list').innerHTML=renderSessionsTable(data,tab);
  }
  $('page').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px"><div class="tabs" style="margin:0;border:none">${['today','upcoming','past','all'].map(t=>`<div class="tab ${t==='today'?'active':''}" data-stab="${t}" onclick="window._sTab('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('')}</div>${CR!=='client'?`<button class="btn btn-p" onclick="openAddSession()">+ Schedule Session</button>`:''}</div><div class="card" style="padding:0"><div class="tbl-wrap" id="sess-list"></div></div>`;
  window._sTab=loadSTab;loadSTab('today');
}
function renderSessionsTable(data,tab){
  if(!data.length){const msgs={today:'No sessions today.',upcoming:'No upcoming sessions.',past:'No past sessions.',all:'No sessions found.'};return emptyState('📅',msgs[tab]||'No sessions',CR!=='client'?'Use the Schedule button to add sessions.':'Your coordinator will schedule sessions.',CR!=='client'&&tab!=='past'?'+ Schedule':'',CR!=='client'&&tab!=='past'?'openAddSession()':'');}
  return`<table><thead><tr><th>Date</th><th>Time</th><th>Client</th><th>Trainer</th><th>Type</th><th>Status</th><th>Meet Link</th><th>Actions</th></tr></thead><tbody>${data.map(s=>`<tr><td style="font-size:12px">${s.date||'—'}</td><td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)">${to12h(s.time)}</td><td><strong>${s.clientName||'—'}</strong></td><td style="font-size:12px">${s.trainerName||'—'}</td><td style="font-size:12px">${s.type||'—'}</td><td>${statusBadge(s.status)}</td><td>${s.meetLink?`<a href="${s.meetLink}" target="_blank" style="color:var(--accent);font-size:12px">Join 🔗</a>`:'—'}</td><td><div class="td-actions">${CR!=='client'&&s.status==='not-started'?`<button class="btn btn-gr btn-sm" onclick="markSessionStatus('${s.id}','onair',true)">▶ Start</button>`:''}${(CR==='coordinator'||CR==='coordinatorhead')&&s.status==='onair'?`<button class="btn btn-p btn-sm" onclick="markSessionStatus('${s.id}','completed')">✓ Done</button><button class="btn btn-d btn-sm" onclick="markSessionStatus('${s.id}','missed')">✗ Miss</button>`:''}${CR==='admin'&&s.status==='onair'?`<button class="btn btn-p btn-sm" onclick="markSessionStatus('${s.id}','completed',true)">✓ Done</button><button class="btn btn-d btn-sm" onclick="markSessionStatus('${s.id}','missed')">✗ Miss</button>`:''}${CR==='trainer'&&(s.status==='onair'||s.status==='not-started')?`<button class="btn btn-p btn-sm" onclick="markSessionStatus('${s.id}','completed',true)">✓ Done</button><button class="btn btn-d btn-sm" onclick="markSessionStatus('${s.id}','missed',true)">✗ Miss</button>`:''}${CR==='admin'||CR==='coordinator'||CR==='coordinatorhead'?`<button class="btn btn-g btn-sm" onclick="openEditSession('${s.id}')">Edit</button><button class="btn btn-d btn-sm" onclick="delSession('${s.id}')">Del</button>`:''}${(CR==='coordinator'||CR==='coordinatorhead')&&s.status==='completed'?`<button class="btn btn-yw btn-sm" onclick="openRateTrainer('${s.trainerId||''}','${(s.trainerName||'').replace(/'/g,"\\'")}')">⭐ Rate</button>`:''}
  </div></td></tr>`).join('')}</tbody></table>`;
}

async function saveSession(existingId=''){const clientId=$('sf-client-id').value||$('sf-client-inp')?.dataset.selectedId||'';const clientName=$('sf-client-inp')?.value||'';const trainerId=$('sf-trainer-id').value||$('sf-trainer-inp')?.dataset.selectedId||'';const trainerName=($('sf-trainer-inp')?.value||'').replace(/\s*\([^)]*\)\s*$/,'').trim();const date=$('sf-date').value,time=$('sf-time').value;if(!clientName||!trainerName||!date||!time){toast('Client, trainer, date and time required','error');return}const data={clientId,clientName,trainerId,trainerName,date,time,type:$('sf-type').value,status:$('sf-status').value||'not-started',meetLink:$('sf-link').value.trim(),notes:$('sf-notes').value};try{if(existingId){await fsUpdate('sessions',existingId,data);toast('Updated!','success')}else{await fsAdd('sessions',data);toast('Scheduled!','success')}closeM2();sessions();}catch(e){toast('Error: '+e.message,'error')}}

async function exportPDF(){
  toast('Generating PDF…','info');
  const now=new Date();const monthName=now.toLocaleString('en-IN',{month:'long'});const year=now.getFullYear();
  const[clients,sessions,attendance,followups,trainers]=await Promise.all([fsGetAll('clients',fn().where('active','==',true)),fsGetAll('sessions'),fsGetAll('attendance'),fsGetAll('followups'),fsGetAll('users',fn().where('role','==','trainer'))]);
  const month=now.getMonth();const monthSessions=sessions.filter(s=>s.date&&new Date(s.date).getMonth()===month&&new Date(s.date).getFullYear()===year);
  try{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});const pageW=doc.internal.pageSize.getWidth();
    doc.setFillColor(20,20,20);doc.rect(0,0,pageW,22,'F');doc.setTextColor(212,255,0);doc.setFontSize(18);doc.setFont('helvetica','bold');doc.text('GYM AT YOUR HOME',pageW/2,10,{align:'center'});doc.setFontSize(10);doc.setTextColor(200,200,200);doc.text(`Monthly Report — ${monthName} ${year}  |  Generated: ${now.toLocaleString('en-IN')}`,pageW/2,17,{align:'center'});
    doc.setTextColor(30,30,30);doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text('Summary',14,30);
    const completed=monthSessions.filter(s=>s.status==='completed').length;const missed=monthSessions.filter(s=>s.status==='missed').length;
    doc.autoTable({startY:33,head:[['Metric','Value']],body:[['Active Clients',clients.length],['Total Sessions This Month',monthSessions.length],['Completed Sessions',completed],['Missed Sessions',missed],['Total Trainers',trainers.length],['Total Follow-ups',followups.length]],theme:'grid',headStyles:{fillColor:[212,255,0],textColor:[0,0,0],fontStyle:'bold'},styles:{fontSize:10},margin:{left:14,right:14}});
    doc.addPage();doc.autoTable({startY:22,head:[['Name','Phone','Plan','Trainer','Coordinator','Goal','Start Date','Sessions/Wk','Status']],body:clients.map(c=>[c.name||'—',c.phone||'—',c.plan||'—',c.trainerName||'—',c.coordinatorName||'—',c.goal||'—',c.startDate||'—',c.sessionsPerWeek||'—',c.active?'Active':'Inactive']),theme:'striped',headStyles:{fillColor:[40,40,40],textColor:[212,255,0]},styles:{fontSize:8},margin:{left:10,right:10}});
    doc.save(`GYH_Report_${monthName}_${year}.pdf`);toast(`PDF exported!`,'success');
  }catch(e){toast('PDF error: '+e.message,'error');}
}

function filterChatContacts(){const v=($('chat-search-inp').value||'').toLowerCase();const filtered=(window._chatContacts||[]).filter(c=>(c.name||'').toLowerCase().includes(v)||(c.email||'').toLowerCase().includes(v));renderChatContacts(filtered)}

async function openChatWith(contactId,contactName,contactRole,rawRole){
  document.querySelectorAll('.chat-item').forEach(i=>i.classList.remove('active'));
  const ci=$(`ci-${contactId}`);if(ci)ci.classList.add('active');
  const myUid=window._chatMyUid||auth().currentUser.uid;
  const chatId=getChatId(myUid,contactId);
  window._activeChatId=chatId;window._activeChatContactId=contactId;
  const rc=roleColorForChat(rawRole);
  $('chat-main').innerHTML=`
    <div class="chat-header">
      <div style="width:36px;height:36px;border-radius:50%;background:${rc.bg};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:${rc.fg}">${(contactName||'?')[0].toUpperCase()}</div>
      <div><div style="font-weight:600;font-size:14px">${contactName}</div><div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${rc.fg}">${contactRole}</div></div>
    </div>

    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-inp" placeholder="Type a message… (Enter to send)" rows="1" onkeydown="chatEnterSend(event,'${chatId}','${myUid}','${contactId}')"></textarea>
      <button class="btn btn-p" onclick="sendChatMsg('${chatId}','${myUid}','${contactId}')">Send</button>
    </div>`;
  if(_chatUnsub){_chatUnsub();_chatUnsub=null}
  try{
    const msgsRef=fn().collection(db(),`chats/${chatId}/messages`);
    const q=fn().query(msgsRef,fn().orderBy('timestamp','asc'));
    _chatUnsub=fn().onSnapshot(q,snapshot=>{
      const msgs=$('chat-msgs');if(!msgs)return;

      if(snapshot.empty){msgs.innerHTML=`<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">Start the conversation! 👋</div>`;return}
      snapshot.forEach(doc=>{const m={id:doc.id,...doc.data()};const isMe=m.senderId===myUid;const ts=m.timestamp?fmtFullTime(m.timestamp):'';const div=document.createElement('div');div.className=`msg ${isMe?'msg-out':'msg-in'}`;div.innerHTML=`${m.message}<div class="msg-meta">${ts}${isMe?` · ${m.read?'✓✓':'✓'}`:''}</div>`;msgs.appendChild(div)});
      msgs.scrollTop=msgs.scrollHeight;markMsgsRead(chatId,myUid);

// ── ENROLL (CLIENT) ─────────────────────────────────────────
async function enrollSlotClient(slotId, slotTime){
  const myUid = auth().currentUser.uid;
  try{
    const slotRef = fn().doc(db(),'slots',slotId);
    const snap    = await fn().getDoc(slotRef);
    if(snap.exists()){
      const d = snap.data();
      const enrolled = d.enrolledClients||[];
      const cap = Number(d.maxCapacity)||10;
      if(enrolled.includes(myUid)){ toast('Already booked!','info'); return; }
      if(enrolled.length>=cap){ toast('Slot is full!','error'); return; }
      await fn().updateDoc(slotRef,{
        enrolledClients: [...enrolled, myUid],
        enrolledCount: enrolled.length+1,
        updatedAt: fn().serverTimestamp()
      });
    } else {
      await fn().setDoc(slotRef,{
        slotId, slotTime,
        enrolledClients:[myUid], enrolledCount:1, maxCapacity:10,
        trainerId:'', trainerName:'', trainerGender:'',
        createdAt: fn().serverTimestamp()
      });
    }
    toast(`✅ Booked: ${slotTime}`,'success');
    slots();
  }catch(e){ toast('Error: '+e.message,'error'); }
}

// ── UNENROLL (CLIENT) ───────────────────────────────────────
async function unenrollSlotClient(slotId, slotTime){
  if(!confirm(`Unbook "${slotTime}"?`)) return;
  const myUid = auth().currentUser.uid;
  try{
    const slotRef  = fn().doc(db(),'slots',slotId);
    const snap     = await fn().getDoc(slotRef);
    if(!snap.exists()){ toast('Slot not found','error'); return; }
    const d        = snap.data();
    const enrolled = (d.enrolledClients||[]).filter(id=>id!==myUid);
    await fn().updateDoc(slotRef,{
      enrolledClients: enrolled,
      enrolledCount: enrolled.length,
      updatedAt: fn().serverTimestamp()
    });
    toast(`Unbooked: ${slotTime}`,'info');
    slots();
  }catch(e){ toast('Error: '+e.message,'error'); }
}

// ── ADMIN REMOVE CLIENT FROM SLOT ──────────────────────────
async function adminRemoveFromSlot(slotId, uid, clientName, event){
  event && event.stopPropagation();
  if(!confirm(`Remove "${clientName}" from this slot?`)) return;
  try{
    const slotRef  = fn().doc(db(),'slots',slotId);
    const snap     = await fn().getDoc(slotRef);
    if(!snap.exists()) return;
    const d        = snap.data();
    const enrolled = (d.enrolledClients||[]).filter(id=>id!==uid);
    await fn().updateDoc(slotRef,{
      enrolledClients: enrolled,
      enrolledCount: enrolled.length,
      updatedAt: fn().serverTimestamp()
    });
    toast(`Removed ${clientName} from slot`,'success');
    slots();
  }catch(e){ toast('Error: '+e.message,'error'); }
}

async function saveSlotConfig(slotId, slotTime){
  const trainerSel = $('ms-trainer');
  if(!trainerSel){ toast('Form error','error'); return; }
  const trainerId   = trainerSel.value;
  const selectedOpt = trainerSel.options[trainerSel.selectedIndex];
  const trainerName = trainerId ? selectedOpt.text.replace(/\s*\([^)]*\)\s*$/,'').trim() : '';
  const trainerGender = trainerId ? selectedOpt.dataset.gender||'' : '';
  const cap = Number($('ms-cap').value)||10;
  try{
    const slotRef = fn().doc(db(),'slots',slotId);
    const snap    = await fn().getDoc(slotRef);
    if(snap.exists()){
      await fn().updateDoc(slotRef,{ trainerId, trainerName, trainerGender, maxCapacity:cap, slotTime, updatedAt:fn().serverTimestamp() });
    } else {
      await fn().setDoc(slotRef,{ slotId, trainerId, trainerName, trainerGender, maxCapacity:cap, slotTime, enrolledClients:[], enrolledCount:0, createdAt:fn().serverTimestamp() });
    }
    closeM1(); toast('Slot saved!','success'); slots();
  }catch(e){
    const errEl = $('ms-err');
    if(errEl){ errEl.textContent='Error: '+e.message; errEl.classList.add('show'); }
  }
}

      <div class="fg"><label class="fl">Session Type</label><select class="fs" id="bf-stype">${SESSION_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Company Name</label><input class="fi" id="bf-company" placeholder="Optional"></div>
      <div class="fg"><label class="fl">Max Capacity</label><input class="fi" id="bf-cap" type="number" value="10" min="1" max="50"></div>
    </div>
    <div class="fg"><label class="fl">Schedule / Time *</label><input class="fi" id="bf-schedule" placeholder="e.g. Mon/Wed/Fri 6:00 – 7:00 AM"></div>
    <div class="fg"><label class="fl">Pre-enroll Clients</label><select class="fs" id="bf-clients" multiple style="height:90px">${clients.map(c=>`<option value="${c.id}">${c.name} (${c.plan||'—'})</option>`).join('')}</select></div>
    <div id="bf-err" class="alert alert-err"></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM2()">Cancel</button><button class="btn btn-p" onclick="saveBatch('')">Create</button></div>`);
}
async function openEditBatch(id){
  const b=await fsGet('batches',id);if(!b){toast('Not found','error');return}
  const trainers=await fsGetAll('users',fn().where('role','==','trainer'));
  openM1('EDIT PROGRAM',`
    <div class="fg"><label class="fl">Program Name *</label><input class="fi" id="bf-name" value="${b.batchName||''}"></div>
    <div class="fg"><label class="fl">Assign Trainer</label><select class="fs" id="bf-trainer"><option value="">— Select —</option>${trainers.map(t=>`<option value="${t.id}" data-gender="${t.gender||''}" ${b.trainerId===t.id?'selected':''}>${t.name||t.email} (${t.gender||'Any'})</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Session Type</label><select class="fs" id="bf-stype">${SESSION_TYPES.map(t=>`<option ${b.sessionType===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Schedule</label><input class="fi" id="bf-schedule" value="${b.schedule||''}"></div>
    <div class="fg"><label class="fl">Max Capacity</label><input class="fi" id="bf-cap" type="number" value="${b.maxCapacity||10}"></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM1()">Cancel</button><button class="btn btn-p" onclick="saveBatch('${id}')">Update</button></div>`);
}
async function saveBatch(existingId=''){
  const nameEl=document.getElementById('bf-name');const name=nameEl?nameEl.value.trim():'';
  if(!name){toast('Program name required','error');return}
  const trainerSel=$('bf-trainer');const trainerId=trainerSel?trainerSel.value:'';
  const trainerOpt=trainerSel&&trainerSel.selectedIndex>0?trainerSel.options[trainerSel.selectedIndex]:null;
  const trainerName=trainerOpt?trainerOpt.text.replace(/\s*\([^)]*\)\s*$/,'').trim():'';
  const schedule=document.getElementById('bf-schedule')?.value.trim()||'';
  const maxCap=Number(document.getElementById('bf-cap')?.value)||10;
  const sessionType=document.getElementById('bf-stype')?.value||'Corporate Fitness';
  const plan=document.getElementById('bf-plan')?.value||'';
  const company=document.getElementById('bf-company')?.value.trim()||'';
  const clientsSel=document.getElementById('bf-clients');
  const preEnrolled=clientsSel?Array.from(clientsSel.selectedOptions).map(o=>o.value).filter(v=>v):[];
  const existingBatch=existingId?await fsGet('batches',existingId):null;
  const mergedEnrolled=[...new Set([...(existingBatch?.enrolledClients||[]),...preEnrolled])];
  const data={batchName:name,trainerId,trainerName,sessionType,schedule,maxCapacity:maxCap,company,plan,enrolledClients:mergedEnrolled};
  try{
    if(existingId){await fsUpdate('batches',existingId,data);toast('Updated!','success');closeM1()}
    else{await fsAdd('batches',data);toast('Created!','success');closeM2()}
    batches();
  }catch(e){toast('Error: '+e.message,'error')}
}
async function addClientToBatch(batchId,batchName){
  const clients=await fsGetAll('clients',fn().where('active','==',true));
  const b=await fsGet('batches',batchId);const already=b?.enrolledClients||[];
  const available=clients.filter(c=>!already.includes(c.id));
  openM1(`ADD CLIENT TO: ${batchName.toUpperCase()}`,`
    <div class="fg"><label class="fl">Select Client *</label><select class="fs" id="atb-client"><option value="">— Select —</option>${available.map(c=>`<option value="${c.id}">${c.name} (${c.plan||'—'})</option>`).join('')}</select></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM1()">Cancel</button><button class="btn btn-p" onclick="saveAddClientToBatch('${batchId}')">Add</button></div>`);
}
async function saveAddClientToBatch(batchId){
  const clientSel=$('atb-client');const clientId=clientSel.value;
  if(!clientId){toast('Select a client','error');return}
  try{const b=await fsGet('batches',batchId);const enrolled=b?.enrolledClients||[];if(enrolled.includes(clientId)){toast('Already enrolled','info');return}if(enrolled.length>=(b?.maxCapacity||10)){toast('At max capacity','error');return}await fn().updateDoc(fn().doc(db(),'batches',batchId),{enrolledClients:[...enrolled,clientId]});closeM1();toast('Client added!','success');batches()}catch(e){toast('Error: '+e.message,'error')}
}
async function delBatch(id){if(!confirm('Delete?'))return;try{await fsDel('batches',id);toast('Deleted','success');batches()}catch(e){toast('Error','error')}}

// ── BADGE HELPERS ─────────────────────────────────────────────
function statusBadge(s){
  const map={onair:`<span class="badge b-g"><span class="dot dot-g"></span>On Air</span>`,'not-started':`<span class="badge b-y"><span class="dot dot-y"></span>Pending</span>`,missed:`<span class="badge b-r"><span class="dot dot-r"></span>Missed</span>`,completed:`<span class="badge b-gray">✓ Done</span>`,present:`<span class="badge b-g">✅ Present</span>`,absent:`<span class="badge b-r">❌ Absent</span>`,late:`<span class="badge b-y">⏰ Late</span>`};
  return map[s]||`<span class="badge b-gray">${s||'—'}</span>`;
}
function planBadge(p){
  if(!p)return`<span class="badge b-gray">—</span>`;
  if(p==='Gold')return`<span class="badge b-y">🥇 Gold</span>`;
  if(p==='Platinum')return`<span class="badge b-p">💎 Platinum</span>`;
  if(p==='Platinum Plus')return`<span class="badge b-p">💎+ Plat+</span>`;
  if(p==='Corporate Fitness')return`<span class="badge b-b">🏢 Corporate</span>`;
  return`<span class="badge b-gray">🥈 Silver</span>`;
}

// ── FIREBASE INIT ─────────────────────────────────────────────
document.addEventListener('fbReady',()=>{
  initTheme();
  const{onAuthStateChanged}=window.FN;
  onAuthStateChanged(window.FB.auth,async user=>{
    await new Promise(r=>setTimeout(r,1600));
    $('loader').classList.add('out');
    if(user){
      try{
        const uDoc=await fsGet('users',user.uid);
        if(uDoc&&uDoc.role){CU=uDoc;CR=uDoc.role;startApp()}
        else{await window.FN.signOut(window.FB.auth);$('login-page').style.display='flex'}
      }catch(e){$('login-page').style.display='flex'}
    }else{$('login-page').style.display='flex'}
  });
});
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&$('login-page').style.display==='flex')doLogin()});
</script>
