<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gym At Your Home™</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, sendPasswordResetEmail, updatePassword, onAuthStateChanged, createUserWithEmailAndPassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyD74nDiTH5N7MbrebMeCvGvEoN-MiBeAjE",
  authDomain: "gym-at-your-home.firebaseapp.com",
  projectId: "gym-at-your-home",
  storageBucket: "gym-at-your-home.firebasestorage.app",
  messagingSenderId: "121868556583",
  appId: "1:121868556583:web:4db28f288568bf7839f102"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const app2 = initializeApp(firebaseConfig, 'secondary');
const auth2 = getAuth(app2);
window.FB = { auth, db, auth2 };
window.FN = {
  signInWithEmailAndPassword, signOut, sendPasswordResetEmail, updatePassword,
  onAuthStateChanged, createUserWithEmailAndPassword,
  EmailAuthProvider, reauthenticateWithCredential,
  collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc,
  query, where, orderBy, serverTimestamp, onSnapshot, limit
};
document.dispatchEvent(new Event('fbReady'));
</script>
<style>
:root {
  --bg:#0b0b0b;--surface:#141414;--card:#1c1c1c;--border:#272727;--border2:#333;
  --text:#f0f0eb;--muted:#888;--muted2:#555;
  --accent:#d4ff00;--accent-dim:rgba(212,255,0,0.1);
  --green:#00e676;--green-dim:rgba(0,230,118,0.12);
  --red:#ff4444;--red-dim:rgba(255,68,68,0.12);
  --yellow:#ffbb00;--yellow-dim:rgba(255,187,0,0.12);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.12);
  --purple:#aa66ff;--purple-dim:rgba(170,102,255,0.12);
  --orange:#ff8c00;--orange-dim:rgba(255,140,0,0.12);
  --pink:#ff69b4;--pink-dim:rgba(255,105,180,0.12);
  --teal:#00d4aa;--teal-dim:rgba(0,212,170,0.12);
  --sw:252px;
}
body.light-theme {
  --bg:#f4f4f0;--surface:#ffffff;--card:#fafafa;--border:#e0e0e0;--border2:#d0d0d0;
  --text:#1a1a1a;--muted:#666;--muted2:#999;
  --accent:#5a9e00;--accent-dim:rgba(90,158,0,0.1);
  --green:#00a050;--green-dim:rgba(0,160,80,0.12);
  --red:#cc2222;--red-dim:rgba(204,34,34,0.12);
  --yellow:#cc8800;--yellow-dim:rgba(204,136,0,0.12);
  --blue:#2266cc;--blue-dim:rgba(34,102,204,0.12);
  --purple:#7733cc;--purple-dim:rgba(119,51,204,0.12);
  --orange:#cc5500;--orange-dim:rgba(204,85,0,0.12);
  --pink:#cc3377;--pink-dim:rgba(204,51,119,0.12);
  --teal:#008866;--teal-dim:rgba(0,136,102,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}
/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loader.out{opacity:0;pointer-events:none}
.ld-logo{font-size:56px;margin-bottom:16px;animation:ldpulse 1.4s ease-in-out infinite}
.ld-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;margin-bottom:24px}
.ld-bar{width:200px;height:3px;background:var(--border2);border-radius:3px;overflow:hidden}
.ld-fill{height:100%;background:var(--accent);animation:ldfill 1.8s ease forwards}
@keyframes ldpulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes ldfill{from{width:0}to{width:100%}}
/* ── LOGIN ── */
#login-page{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse 70% 50% at 80% 10%,rgba(212,255,0,.07) 0,transparent 60%),var(--bg)}
.lc{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 40px 100px rgba(0,0,0,.4)}
.lc-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;margin-bottom:6px}
.lc-brand small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase}
.lc h2{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;margin-bottom:4px}
.lc p{color:var(--muted);font-size:13px;margin-bottom:28px}
/* ── FORMS ── */
.fg{margin-bottom:14px}
.fg label,.fl{display:block;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.fi,.fs,.fta{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s,-webkit-tap-highlight-color 0s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent)}
.fs option{background:var(--surface)}
.fta{resize:vertical;min-height:76px}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
/* ── ALERTS ── */
.alert{padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:14px;display:none}
.alert.show{display:block}
.alert-err{background:var(--red-dim);border:1px solid rgba(255,68,68,.3);color:var(--red)}
.alert-ok{background:var(--green-dim);border:1px solid rgba(0,230,118,.3);color:var(--green)}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:9px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;text-decoration:none;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn-p{background:var(--accent);color:#000}.btn-p:active{transform:scale(.97)}
.btn-d{background:var(--red);color:#fff}
.btn-g{background:transparent;color:var(--text);border:1px solid var(--border2)}.btn-g:hover{border-color:var(--accent);color:var(--accent)}
.btn-gr{background:var(--green);color:#000}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-w{width:100%}
.btn-yw{background:var(--yellow);color:#000}
.btn-or{background:var(--orange);color:#fff}
.btn-pu{background:var(--purple);color:#fff}
.btn-bl{background:var(--blue);color:#fff}
.btn-pk{background:var(--pink);color:#fff}
.btn-tl{background:var(--teal);color:#000}
.btn-wa{background:#25D366;color:#fff}
/* ── APP LAYOUT ── */
#app{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
/* ── SIDEBAR ── */
.sidebar{width:var(--sw);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden}
.sb-head{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo{font-size:28px}
.sb-brand{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.8px;line-height:1.2}
.sb-brand small{display:block;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.sb-user{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ua{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.un{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ur{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;display:inline-block;margin-top:2px}
.r-admin{background:var(--purple-dim);color:var(--purple)}
.r-coordinator{background:var(--blue-dim);color:var(--blue)}
.r-coordinatorhead{background:var(--orange-dim);color:var(--orange)}
.r-trainer{background:var(--green-dim);color:var(--green)}
.r-client{background:var(--yellow-dim);color:var(--yellow)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.nav-sec{padding:0 10px;margin-top:2px}
.nav-sec-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:8px 6px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-left:2px solid transparent;border-radius:0 8px 8px 0;margin-right:4px;transition:all .15s}
.ni:hover{background:rgba(128,128,128,.08);color:var(--text)}
.ni.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent)}
.ni-ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.ni-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
/* ── MAIN ── */
.main{margin-left:var(--sw);flex:1;min-height:100vh;background:var(--bg)}
.topbar{height:58px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;position:sticky;top:0;z-index:100;gap:12px}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;flex:1}
.tb-date{font-size:11px;color:var(--muted);display:none}
.icon-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:7px 10px;cursor:pointer;color:var(--text);font-size:14px;transition:border-color .2s;position:relative;display:flex;align-items:center;gap:5px}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.ndot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1px solid var(--surface)}
.mob-menu{display:none;background:transparent;border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:8px;cursor:pointer;font-size:18px}
.page{padding:18px;padding-bottom:90px}
/* ── MOBILE BOTTOM NAV ── */
.mob-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:150;padding:6px 0 env(safe-area-inset-bottom,6px);box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.mbn-inner{display:flex;justify-content:space-around;align-items:center}
.mbn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;cursor:pointer;border-radius:10px;transition:all .15s;color:var(--muted);min-width:52px}
.mbn-item.active{color:var(--accent)}
.mbn-ico{font-size:20px;line-height:1}
.mbn-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.card-title{font-size:13px;font-weight:700;letter-spacing:.3px}
/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative;overflow:hidden;transition:transform .15s,border-color .15s}
.sc:active{transform:scale(.98)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc-a::before{background:var(--accent)}.sc-g::before{background:var(--green)}.sc-r::before{background:var(--red)}.sc-b::before{background:var(--blue)}.sc-p::before{background:var(--purple)}.sc-y::before{background:var(--yellow)}.sc-o::before{background:var(--orange)}.sc-t::before{background:var(--teal)}
.sc-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.sc-val{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1px;line-height:1}
.sc-sub{font-size:11px;color:var(--muted);margin-top:2px}
.sc-ico{position:absolute;right:12px;top:12px;font-size:22px;opacity:.12}
.sc-trend{font-size:11px;font-weight:600;margin-top:4px}
.sc-trend.up{color:var(--green)}.sc-trend.down{color:var(--red)}
/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
thead th{padding:10px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:rgba(128,128,128,.04);white-space:nowrap}
tbody td{padding:11px 12px;border-bottom:1px solid rgba(128,128,128,.06);vertical-align:middle}
tbody tr:hover{background:rgba(128,128,128,.04)}
tbody tr:last-child td{border-bottom:none}
.td-actions{display:flex;gap:4px;flex-wrap:wrap}
/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.b-g{background:var(--green-dim);color:var(--green)}.b-y{background:var(--yellow-dim);color:var(--yellow)}.b-r{background:var(--red-dim);color:var(--red)}.b-b{background:var(--blue-dim);color:var(--blue)}.b-p{background:var(--purple-dim);color:var(--purple)}.b-gray{background:rgba(128,128,128,.12);color:var(--muted)}.b-a{background:var(--accent-dim);color:var(--accent)}.b-o{background:var(--orange-dim);color:var(--orange)}.b-pk{background:var(--pink-dim);color:var(--pink)}.b-t{background:var(--teal-dim);color:var(--teal)}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.dot-g{background:var(--green);animation:blink 1.4s infinite}.dot-y{background:var(--yellow)}.dot-r{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* ── MODALS ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:1000;align-items:flex-end;justify-content:center;padding:0}
.mo.open{display:flex}
@media(min-width:600px){.mo{align-items:center;padding:20px}}
.mb{background:var(--card);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-width:100%;max-height:92vh;overflow-y:auto;padding:24px 20px;animation:mobslide .25s ease;overscroll-behavior:contain}
@media(min-width:600px){.mb{border-radius:16px;max-width:520px;animation:moslide .2s ease}}
.mb-lg{max-width:760px}.mb-xl{max-width:960px}
@keyframes mobslide{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes moslide{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.mo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mo-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.mo-x{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s}
.mo-x:hover{background:rgba(128,128,128,.1)}
.mo-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;text-align:center}
.empty-ico{font-size:44px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--muted)}
.empty-sub{font-size:13px;color:var(--muted2);margin-bottom:18px}
/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;color:var(--muted);white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* ── TOASTS ── */
#toasts{position:fixed;bottom:80px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:7px}
@media(min-width:769px){#toasts{bottom:20px}}
.toast{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;min-width:240px;max-width:320px;display:flex;align-items:center;gap:9px;font-size:13px;animation:tslide .25s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast-ok{border-left:3px solid var(--green)}.toast-err{border-left:3px solid var(--red)}.toast-info{border-left:3px solid var(--blue)}
@keyframes tslide{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* ── CHART BOX ── */
.chart-box{position:relative;height:200px}
/* ── GRID LAYOUTS ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
/* ── PROGRESS ── */
.pb-wrap{margin-bottom:8px}
.pb-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.pb{height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .6s ease}
/* ── NOTIFICATION PANEL ── */
.notif-panel{position:fixed;top:58px;right:16px;width:340px;max-height:480px;background:var(--card);border:1px solid var(--border2);border-radius:14px;z-index:500;box-shadow:0 16px 48px rgba(0,0,0,.4);overflow:hidden;display:none;flex-direction:column}
.notif-panel.open{display:flex}
.notif-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-list{overflow-y:auto;flex:1}
.notif-item{padding:12px 16px;border-bottom:1px solid rgba(128,128,128,.06);font-size:13px;cursor:default;transition:background .15s}
.notif-item.unread{border-left:3px solid var(--accent)}
.notif-item-title{font-weight:600;margin-bottom:3px}
.notif-item-sub{font-size:12px;color:var(--muted)}
.notif-item-time{font-size:10px;color:var(--muted2);margin-top:3px}
/* ── CHAT ── */
.chat-layout{display:grid;grid-template-columns:290px 1fr;height:calc(100vh - 100px);gap:0;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--card)}
.chat-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.chat-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.chat-list{flex:1;overflow-y:auto}
.chat-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid rgba(128,128,128,.05);transition:background .15s;display:flex;align-items:center;gap:10px;position:relative}
.chat-item:hover{background:rgba(128,128,128,.06)}
.chat-item.active{background:var(--accent-dim);border-left:2px solid var(--accent)}
.chat-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-main{display:flex;flex-direction:column;background:var(--bg)}
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface)}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:70%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.msg-out{align-self:flex-end;background:var(--accent);color:#000;border-bottom-right-radius:4px}
.msg-in{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-meta{font-size:10px;margin-top:4px;opacity:.6}
.chat-input-area{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface);align-items:flex-end}
.chat-input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:none;min-height:40px;max-height:100px;line-height:1.4}
.chat-input:focus{border-color:var(--accent)}
/* ── PAYMENT CARD ── */
.payment-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.payment-card:hover{border-color:var(--accent)}
.payment-card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
/* ── PROGRESS LOG ── */
.progress-log-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.progress-log-item:last-child{border-bottom:none}
.pl-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px}
.pl-meta{font-size:11px;color:var(--muted)}
/* ── MEAL PLAN ── */
.meal-slot{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.meal-slot-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.meal-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(128,128,128,.06)}
.meal-item:last-child{border-bottom:none}
/* ── WORKOUT PLAN ── */
.exercise-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.exercise-title{font-weight:700;font-size:13px;margin-bottom:4px}
.exercise-meta{font-size:12px;color:var(--muted)}
/* ── DOTS MENU ── */
.dots-menu-wrap{position:relative;display:inline-block}
.dots-btn{background:transparent;border:1px solid var(--border2);border-radius:7px;padding:5px 9px;cursor:pointer;color:var(--text);font-size:18px;line-height:1}
.dots-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--card);border:1px solid var(--border2);border-radius:10px;z-index:600;min-width:190px;box-shadow:0 12px 36px rgba(0,0,0,.4);overflow:hidden;display:none;animation:moslide .15s ease}
.dots-dropdown.open{display:block}
.dots-item{padding:11px 16px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:9px;transition:background .15s;border-bottom:1px solid rgba(128,128,128,.07)}
.dots-item:last-child{border-bottom:none}
.dots-item:hover{background:var(--accent-dim);color:var(--accent)}
/* ── COLLAPSIBLE ── */
.collapsible-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color .2s;user-select:none}
.collapsible-hd:hover{border-color:var(--accent)}
.collapsible-hd.open{border-radius:12px 12px 0 0;border-bottom-color:transparent}
.collapsible-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:16px;display:none}
.collapsible-body.open{display:block}
.collapsible-arrow{font-size:11px;color:var(--muted);transition:transform .2s}
.collapsible-hd.open .collapsible-arrow{transform:rotate(180deg)}
/* ── AUTOCOMPLETE ── */
.ac-wrap{position:relative}
.ac-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border2);border-radius:9px;z-index:2000;max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none}
.ac-dropdown.open{display:block}
.ac-item{padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(128,128,128,.06);display:flex;align-items:center;gap:8px;transition:background .1s}
.ac-item:hover,.ac-item.selected{background:var(--accent-dim);color:var(--accent)}
.ac-item-sub{font-size:11px;color:var(--muted);margin-left:auto}
/* ── STAR RATING ── */
.star-rating-widget{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;margin-bottom:14px}
.star-btn{font-size:30px;cursor:pointer;transition:transform .15s;background:none;border:none;padding:4px;color:var(--muted2);filter:grayscale(1)}
.star-btn.active,.star-btn:hover{filter:none;transform:scale(1.15)}
.star-btn[data-val="1"].active{color:#ff4444}
.star-btn[data-val="2"].active{color:#ff7700}
.star-btn[data-val="3"].active{color:var(--yellow)}
.star-btn[data-val="4"].active{color:#88cc00}
.star-btn[data-val="5"].active{color:var(--accent)}
.mini-star-btn{font-size:20px;cursor:pointer;background:none;border:none;padding:1px;color:var(--muted2);filter:grayscale(1);transition:filter .1s}
.mini-star-btn.active{filter:none;color:var(--yellow)}
/* ── LEADERBOARD ── */
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;background:var(--surface);border:1px solid var(--border);margin-bottom:8px;transition:border-color .2s}
.lb-row:hover{border-color:var(--accent)}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:22px;min-width:28px;text-align:center}
.lb-rank.gold{color:#ffd700}.lb-rank.silver{color:#c0c0c0}.lb-rank.bronze{color:#cd7f32}.lb-rank.other{color:var(--muted)}
/* ── MISSED REASON ── */
.missed-reason-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:600px){.missed-reason-overlay{align-items:center;padding:20px}}
.missed-reason-box{background:var(--card);border:2px solid rgba(255,68,68,.5);border-radius:20px 20px 0 0;width:100%;max-width:100%;max-height:92vh;overflow-y:auto;padding:24px 20px}
@media(min-width:600px){.missed-reason-box{border-radius:16px;max-width:500px}}
/* ── WHATSAPP ── */
.wa-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none}
/* ── SPIN ── */
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── KPI TREND MINI CHART ── */
.mini-sparkline{display:flex;align-items:flex-end;gap:2px;height:30px}
.spark-bar{width:4px;border-radius:2px;background:var(--accent);opacity:.5;transition:height .4s}
/* ── MOBILE OVERRIDES ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.mob-menu{display:flex}
  .mob-bottom-nav{display:block}
  .tb-date{display:none}
  .fr{grid-template-columns:1fr}.fr3{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}.three-col{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}.page{padding:12px;padding-bottom:90px}
  .chat-layout{grid-template-columns:1fr;height:auto}.chat-sidebar{height:200px}
  .lc{padding:28px 18px}
  .notif-panel{width:calc(100vw - 32px)}
  #toasts{right:8px;left:8px}
  .toast{max-width:100%;min-width:auto}
}
#mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:190}
#mob-ov.open{display:block}
</style>

<script>
'use strict';
const PLANS=['Silver','Gold','Platinum','Platinum Plus','Couple','Corporate Fitness'];
const SESSION_TYPES=['Batch Session','One on One','Corporate Fitness','Couple Training','Strength Training','Cardio','HIIT','Yoga','CrossFit','Pilates','Zumba','Rehabilitation','General Fitness'];
const COUNTRIES=['Afghanistan','Albania','Algeria','Argentina','Australia','Austria','Bahrain','Bangladesh','Belgium','Brazil','Canada','Chile','China','Colombia','Croatia','Czech Republic','Denmark','Egypt','Ethiopia','Finland','France','Germany','Ghana','Greece','Hungary','India','Indonesia','Iran','Iraq','Ireland','Israel','Italy','Japan','Jordan','Kenya','Kuwait','Lebanon','Malaysia','Mexico','Morocco','Netherlands','New Zealand','Nigeria','Norway','Oman','Pakistan','Peru','Philippines','Poland','Portugal','Qatar','Romania','Russia','Saudi Arabia','Singapore','South Africa','South Korea','Spain','Sri Lanka','Sweden','Switzerland','Thailand','Turkey','UAE','Uganda','Ukraine','United Kingdom','United States','Vietnam','Zimbabwe'];
const RATING_CRITERIA=[{id:'punctuality',label:'Punctuality',icon:'⏰',desc:'On time'},{id:'technique',label:'Technique',icon:'💪',desc:'Form & guidance'},{id:'communication',label:'Communication',icon:'🗣',desc:'Clear & motivating'},{id:'clientProgress',label:'Client Progress',icon:'📈',desc:'Results & improvement'},{id:'professionalism',label:'Professionalism',icon:'🎯',desc:'Conduct & attitude'}];
const MEAL_TIMES=['Early Morning','Breakfast','Mid Morning','Lunch','Evening Snack','Dinner','Post Workout','Pre Workout'];
const EXERCISE_CATEGORIES=['Chest','Back','Shoulders','Arms','Core','Legs','Glutes','Cardio','Flexibility','Full Body'];

let CU=null,CR=null,CH={};
let _chatUnsub=null,_notifUnsub=null,_notifCheckTimer=null;
let _notifications=[];

// ══ HELPERS ══
const $=id=>document.getElementById(id);
const el=(tag,cls,html='')=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e};
function toast(msg,type='info'){const t=document.createElement('div');t.className=`toast toast-${type==='success'?'ok':type==='error'?'err':'info'}`;t.innerHTML=`<span>${type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span><span style="flex:1">${msg}</span>`;$('toasts').appendChild(t);setTimeout(()=>t.remove(),4000);}
function openM1(title,html){$('m1t').textContent=title;$('m1c').innerHTML=html;$('m1').classList.add('open')}
function closeM1(){$('m1').classList.remove('open')}
function openM2(title,html){$('m2t').textContent=title;$('m2c').innerHTML=html;$('m2').classList.add('open')}
function closeM2(){$('m2').classList.remove('open')}
function openM3(title,html){$('m3t').textContent=title;$('m3c').innerHTML=html;$('m3').classList.add('open')}
function closeM3(){$('m3').classList.remove('open')}
function togglePwd(id,btn){const i=$(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈'}
function toggleSB(){$('sidebar').classList.toggle('open');$('mob-ov').classList.toggle('open')}
function closeSB(){$('sidebar').classList.remove('open');$('mob-ov').classList.remove('open')}
function fmt12(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}
function fmtDate(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
function fmtFullTime(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true})}
function to12h(t){if(!t||!t.includes(':'))return t||'—';const[h,m]=t.split(':').map(Number);const ap=h>=12?'PM':'AM';const h12=h%12||12;return`${h12}:${String(m).padStart(2,'0')} ${ap}`}
function destroyCharts(){Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});CH={}}
function emptyState(ico,title,sub,btnLabel,btnFn){return`<div class="empty"><div class="empty-ico">${ico}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div>${btnLabel?`<button class="btn btn-p" onclick="${btnFn}">${btnLabel}</button>`:''}</div>`}
function starsHtml(r){const n=Math.round(r||0);return'★'.repeat(n)+'☆'.repeat(5-n)}
function avgRating(ratings){if(!ratings||!ratings.length)return 0;return ratings.reduce((s,r)=>s+(r.rating||0),0)/ratings.length}
function fmtCurrency(n){return'₹'+Number(n||0).toLocaleString('en-IN')}
function waLink(phone,msg=''){const p=(phone||'').replace(/\D/g,'');if(!p)return null;const enc=msg?'?text='+encodeURIComponent(msg):'';return`https://wa.me/${p.startsWith('91')?p:'91'+p}${enc}`}
function openDotsMenu(id){document.querySelectorAll('.dots-dropdown').forEach(d=>{if(d.id!==id)d.classList.remove('open')});const dd=$(id);if(dd)dd.classList.toggle('open')}
document.addEventListener('click',e=>{if(!e.target.closest('.dots-menu-wrap'))document.querySelectorAll('.dots-dropdown').forEach(d=>d.classList.remove('open'))});
function toggleCollapsible(id){const hd=$('col-hd-'+id),body=$('col-body-'+id);if(!hd||!body)return;const open=body.classList.contains('open');hd.classList.toggle('open',!open);body.classList.toggle('open',!open)}

const db=()=>window.FB.db;
const auth=()=>window.FB.auth;
const fn=()=>window.FN;

// ══ FIREBASE CRUD ══
async function fsGet(path,id){try{const s=await fn().getDoc(fn().doc(db(),path,id));return s.exists()?{id:s.id,...s.data()}:null}catch(e){return null}}
async function fsGetAll(path,...constraints){try{const q=constraints.length?fn().query(fn().collection(db(),path),...constraints):fn().collection(db(),path);const s=await fn().getDocs(q);const out=[];s.forEach(d=>out.push({id:d.id,...d.data()}));return out}catch(e){return[]}}
async function fsAdd(path,data){return fn().addDoc(fn().collection(db(),path),{...data,createdAt:fn().serverTimestamp()})}
async function fsSet(path,id,data){return fn().setDoc(fn().doc(db(),path,id),{...data,updatedAt:fn().serverTimestamp()})}
async function fsUpdate(path,id,data){return fn().updateDoc(fn().doc(db(),path,id),{...data,updatedAt:fn().serverTimestamp()})}
async function fsDel(path,id){return fn().deleteDoc(fn().doc(db(),path,id))}

// ══ BADGES ══
function statusBadge(s){const m={onair:`<span class="badge b-g"><span class="dot dot-g"></span>On Air</span>`,'not-started':`<span class="badge b-y"><span class="dot dot-y"></span>Pending</span>`,completed:`<span class="badge b-gray">✓ Done</span>`,missed:`<span class="badge b-r"><span class="dot dot-r"></span>Missed</span>`,present:`<span class="badge b-g">✅ Present</span>`,absent:`<span class="badge b-r">❌ Absent</span>`,late:`<span class="badge b-y">⏰ Late</span>`,paid:`<span class="badge b-g">✅ Paid</span>`,pending:`<span class="badge b-y">⏳ Pending</span>`,overdue:`<span class="badge b-r">🔴 Overdue</span>`,partial:`<span class="badge b-o">⚡ Partial</span>`};return m[s]||`<span class="badge b-gray">${s||'—'}</span>`}
function planBadge(p){const m={Silver:`<span class="badge b-gray">🥈 Silver</span>`,Gold:`<span class="badge b-y">🥇 Gold</span>`,Platinum:`<span class="badge b-p">💎 Platinum</span>`,'Platinum Plus':`<span class="badge b-p">💎+ Plat+</span>`,Couple:`<span class="badge b-pk">👫 Couple</span>`,'Corporate Fitness':`<span class="badge b-b">🏢 Corporate</span>`};return m[p]||`<span class="badge b-gray">${p||'—'}</span>`}

// ══ AUTOCOMPLETE ══
function createAutocomplete(inputEl,items,opts={}){if(!inputEl)return;let wrap=inputEl.parentElement;if(!wrap.classList.contains('ac-wrap')){const w=document.createElement('div');w.className='ac-wrap';inputEl.parentNode.insertBefore(w,inputEl);w.appendChild(inputEl);wrap=w}let dd=wrap.querySelector('.ac-dropdown');if(!dd){dd=document.createElement('div');dd.className='ac-dropdown';wrap.appendChild(dd)}let allItems=typeof items==='function'?[]:items;let selIdx=-1;const minChars=opts.minChars??1;async function refresh(){if(typeof items==='function')allItems=await items()}function show(filtered){selIdx=-1;if(!filtered.length){dd.innerHTML=`<div style="padding:10px 14px;font-size:13px;color:var(--muted)">No results</div>`}else{dd.innerHTML=filtered.map((it,i)=>`<div class="ac-item" data-idx="${i}" data-id="${it.id||''}" data-label="${(it.label||'').replace(/"/g,'&quot;')}"><span>${it.label||''}</span>${it.sub?`<span class="ac-item-sub">${it.sub}</span>`:''}</div>`).join('');dd.querySelectorAll('.ac-item').forEach(e=>{e.addEventListener('mousedown',ev=>{ev.preventDefault();selectItem(filtered[parseInt(e.dataset.idx)])})})}dd.classList.add('open')}function hide(){dd.classList.remove('open');selIdx=-1}function selectItem(it){inputEl.value=it.label||'';inputEl.dataset.selectedId=it.id||'';hide();if(opts.onSelect)opts.onSelect(it)}inputEl.addEventListener('focus',async()=>{await refresh();const v=inputEl.value.trim().toLowerCase();if(v.length>=minChars||minChars===0){const f=allItems.filter(it=>(it.label||'').toLowerCase().includes(v));show(f)}});inputEl.addEventListener('input',async()=>{await refresh();const v=inputEl.value.trim().toLowerCase();if(v.length<minChars){hide();return}const f=allItems.filter(it=>(it.label||'').toLowerCase().includes(v)||(it.sub||'').toLowerCase().includes(v));show(f)});inputEl.addEventListener('keydown',e=>{const its=dd.querySelectorAll('.ac-item');if(!dd.classList.contains('open'))return;if(e.key==='ArrowDown'){e.preventDefault();selIdx=Math.min(selIdx+1,its.length-1);its.forEach((el,i)=>el.classList.toggle('selected',i===selIdx))}else if(e.key==='ArrowUp'){e.preventDefault();selIdx=Math.max(selIdx-1,0);its.forEach((el,i)=>el.classList.toggle('selected',i===selIdx))}else if(e.key==='Enter'&&selIdx>=0){e.preventDefault();its[selIdx].dispatchEvent(new Event('mousedown'))}else if(e.key==='Escape')hide()});document.addEventListener('click',e=>{if(!wrap.contains(e.target))hide()},true);return{refresh,hide}}
function attachClientAC(inputId,hiddenId,clientList,onSelectCb){const inp=$(inputId);if(!inp)return;const items=clientList.map(c=>({id:c.id,label:c.name||'',sub:c.phone||''}));createAutocomplete(inp,items,{minChars:0,onSelect(it){const hid=$(hiddenId);if(hid)hid.value=it.id;if(onSelectCb)onSelectCb(it)}})}
function attachUserAC(inputId,hiddenId,userList,onSelectCb){const inp=$(inputId);if(!inp)return;const items=userList.map(u=>({id:u.id,label:u.name||u.email||'',sub:u.role||''}));createAutocomplete(inp,items,{minChars:0,onSelect(it){const hid=$(hiddenId);if(hid)hid.value=it.id;if(onSelectCb)onSelectCb(it)}})}

let _missedReqUnsub=null;
function initNotifications(){if(_notifCheckTimer)clearInterval(_notifCheckTimer);checkUpcomingSessions();_notifCheckTimer=setInterval(checkUpcomingSessions,60000)}
async function checkUpcomingSessions(){if(!CU||!CR)return;try{const now=new Date(),today=now.toISOString().split('T')[0];const sessions=await fsGetAll('sessions',fn().where('date','==',today),fn().where('status','==','not-started'));for(const s of sessions){if(!s.time)continue;const[h,m]=s.time.split(':').map(Number);const st=new Date(now);st.setHours(h,m,0,0);const diff=Math.round((st-now)/60000);if(diff>55&&diff<=60){const key=`sess-1hr-${s.id}`;const already=await fsGetAll('notifications',fn().where('key','==',key),fn().where('userId','==',CU.id));if(!already.length)await createNotif({key,title:'⏰ Session in 1 Hour',body:`${s.clientName} with ${s.trainerName} at ${to12h(s.time)}`,type:'session_reminder'})}}}catch(e){}}
async function createNotif(data){try{await fsAdd('notifications',{...data,userId:CU.id,read:false,createdAt:fn().serverTimestamp()})}catch(e){}}
async function createNotifForUsers(data,uids){try{await Promise.all(uids.map(uid=>fsAdd('notifications',{...data,userId:uid,read:false,createdAt:fn().serverTimestamp()})))}catch(e){}}
function listenNotifications(){if(!CU)return;if(_notifUnsub){_notifUnsub();_notifUnsub=null}try{const q=fn().query(fn().collection(db(),'notifications'),fn().where('userId','==',CU.id),fn().orderBy('createdAt','desc'),fn().limit(50));_notifUnsub=fn().onSnapshot(q,snap=>{_notifications=[];snap.forEach(d=>_notifications.push({id:d.id,...d.data()}));const unread=_notifications.filter(n=>!n.read).length;const dot=$('notif-dot');if(dot)dot.style.display=unread>0?'block':'none';if($('notif-panel')?.classList.contains('open'))renderNotifList()})}catch(e){}}
function renderNotifList(){const list=$('notif-list');if(!list)return;if(!_notifications.length){list.innerHTML=`<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No notifications yet</div>`;return}list.innerHTML=_notifications.map(n=>`<div class="notif-item ${n.read?'':'unread'}" onclick="markNotifRead('${n.id}')"><div class="notif-item-title">${n.title||'Notification'}</div><div class="notif-item-sub">${n.body||''}</div><div class="notif-item-time">${fmtFullTime(n.createdAt)}</div></div>`).join('')}

function showMissedReasonPopup(sessionId,clientName,trainerName,date,time,reqId=''){
  const ex=$('missed-reason-overlay');if(ex)ex.remove();
  const o=document.createElement('div');o.className='missed-reason-overlay';o.id='missed-reason-overlay';

  o.innerHTML=`<div class="missed-reason-box"><div style="text-align:center;margin-bottom:18px"><div style="font-size:44px">⚠️</div><div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:var(--red)">SESSION MISSED</div></div><div style="background:var(--red-dim);border:1px solid rgba(255,68,68,.4);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px"><strong>${clientName||'—'}</strong> with <strong>${trainerName||'—'}</strong><div style="font-size:12px;color:var(--muted);margin-top:3px">📅 ${date||'—'} at ${to12h(time)}</div></div><div class="fg"><label class="fl">Reason *</label><select class="fs" id="mrp-reason-sel" onchange="toggleMRPOther()"><option value="">— Select reason —</option><option>Client not available</option><option>Trainer absent</option><option>Client emergency</option><option>Technical issues</option><option>Client sick</option><option>Scheduled holiday</option><option>Other</option></select></div><div class="fg" id="mrp-other-wrap" style="display:none"><label class="fl">Specify *</label><textarea class="fta" id="mrp-other" placeholder="Enter reason…"></textarea></div><div class="fg"><label class="fl">Notes</label><textarea class="fta" id="mrp-notes" placeholder="Follow-up actions?" style="min-height:60px"></textarea></div><div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-g" style="flex:1" onclick="dismissMissedPopup()">Skip</button><button class="btn btn-d" style="flex:1" onclick="submitMissedPopup('${sessionId}','${sc}','${st}','${date||''}','${time||''}','${reqId}')">Submit</button></div></div>`;

function toggleMRPOther(){const sel=$('mrp-reason-sel'),wrap=$('mrp-other-wrap');if(wrap)wrap.style.display=sel?.value==='Other'?'block':'none'}
function dismissMissedPopup(){const o=$('missed-reason-overlay');if(o)o.remove()}
async function submitMissedPopup(sessionId,clientName,trainerName,date,time,reqId=''){
  const reason=$('mrp-reason-sel')?.value;if(!reason){toast('Select a reason','error');return}
  const finalReason=reason==='Other'?($('mrp-other')?.value.trim()||'Other'):reason;
  try{await fsAdd('missedreasons',{sessionId,clientName,trainerName,date,time,reason:finalReason,notes:$('mrp-notes')?.value.trim()||'',reportedBy:auth().currentUser.uid,reportedByName:CU.name||'',reportedByRole:CR});if(reqId)await fsUpdate('missedreasonrequests',reqId,{resolved:true});dismissMissedPopup();toast('Reason submitted ✅','success')}catch(e){toast('Error: '+e.message,'error')}
}
function listenForMissedRequests(){
  if(_missedReqUnsub){_missedReqUnsub();_missedReqUnsub=null}
  const myUid=CU.id;
  try{const q=fn().query(fn().collection(db(),'missedreasonrequests'),fn().where('resolved','==',false));let init=true;const seen=new Set();_missedReqUnsub=fn().onSnapshot(q,snap=>{if(init){snap.forEach(d=>seen.add(d.id));init=false;return}snap.docChanges().forEach(ch=>{if(ch.type==='added'){const data={id:ch.doc.id,...ch.doc.data()};if(seen.has(data.id))return;seen.add(data.id);if(data.assignedCoordIds?.includes(myUid))setTimeout(()=>showMissedReasonPopup(data.sessionId||'',data.clientName||'',data.trainerName||'',data.date||'',data.time||'',data.id),800)}})})}catch(e){}
}

async function payments(){
  $('page').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;
  const myUid=auth().currentUser.uid;
  let data=await fsGetAll('payments');
  if(CR==='coordinator')data=data.filter(p=>p.coordinatorId===myUid);
  if(CR==='client'){const myCli=await fsGetAll('clients',fn().where('email','==',CU.email));const myIds=myCli.map(c=>c.id);data=data.filter(p=>myIds.includes(p.clientId))}
  data.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  const total=data.reduce((s,p)=>s+Number(p.amount||0),0);
  const paid=data.filter(p=>p.status==='paid').reduce((s,p)=>s+Number(p.amount||0),0);
  const overdue=data.filter(p=>p.status==='overdue').length;
  const pending=data.filter(p=>p.status==='pending').length;

  logs.sort((a,b)=>(a.date||'').localeCompare(b.date||''));

      <div class="sc sc-g"><div class="sc-ico">📏</div><div class="sc-lbl">Height</div><div class="sc-val">${latest.height||'—'} <span style="font-size:16px">cm</span></div></div>
      <div class="sc sc-b"><div class="sc-ico">💪</div><div class="sc-lbl">BMI</div><div class="sc-val">${latest.weight&&latest.height?(Number(latest.weight)/Math.pow(Number(latest.height)/100,2)).toFixed(1):'—'}</div></div>

    </div>

      <div style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Weight</th><th>Height</th><th>BMI</th><th>Chest</th><th>Waist</th><th>Hips</th><th>Arms</th><th>Thighs</th><th>Notes</th><th>Actions</th></tr></thead>
      <tbody>${[...logs].reverse().map(l=>{const bmi=l.weight&&l.height?(Number(l.weight)/Math.pow(Number(l.height)/100,2)).toFixed(1):'—';return`<tr><td style="font-size:12px;font-family:'JetBrains Mono',monospace">${l.date||'—'}</td><td><strong>${l.weight||'—'}</strong> kg</td><td>${l.height||'—'} cm</td><td><span class="badge ${Number(bmi)<18.5?'b-b':Number(bmi)<25?'b-g':Number(bmi)<30?'b-y':'b-r'}">${bmi}</span></td><td>${l.chest||'—'}</td><td>${l.waist||'—'}</td><td>${l.hips||'—'}</td><td>${l.arms||'—'}</td><td>${l.thighs||'—'}</td><td style="font-size:12px;max-width:120px">${l.notes||'—'}</td><td><button class="btn btn-d btn-sm" onclick="delProgress('${l.id}')">Del</button></td></tr>`}).join('')}</tbody></table></div></div>
    `}`;

// ══ TC HELPERS ══
function getTcVisibleSessions(tcEntries,clients,todayStr){const now=new Date();const result=[];for(const tc of tcEntries){if(!tc.sessionTime)continue;const[h,m]=tc.sessionTime.split(':').map(Number);if(isNaN(h)||isNaN(m))continue;const st=new Date(now);st.setHours(h,m,0,0);if(now<new Date(st.getTime()-3600000))continue;const client=clients.find(c=>c.id===tc.clientId)||{};result.push({id:`tc_${tc.id}`,_isTc:true,_tcId:tc.id,clientId:tc.clientId,clientName:tc.clientName||client.name||'—',trainerId:tc.trainerId||client.trainerId||'',trainerName:tc.trainerName||client.trainerName||'—',time:tc.sessionTime,date:todayStr,type:tc.sessionType||client.goal||'General Fitness',status:tc.todayStatus||'not-started',_tcEntry:tc})}return result}

function renderDashTodaySessions(todayS,tcVisible,canStart){
  const realIds=new Set(todayS.map(s=>s.clientId).filter(Boolean));const tcF=tcVisible.filter(tc=>!realIds.has(tc.clientId));const combined=[...todayS,...tcF];combined.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  if(!combined.length)return emptyState('📅','No sessions today','','','');
  return`<div>${combined.map(s=>{const isTc=!!s._isTc;const wl=waLink(s.clientPhone||'',`Hi ${s.clientName}! Your session starts soon 💪`);return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap"><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);min-width:75px">${to12h(s.time)}</div><div style="flex:1;min-width:120px"><div style="font-weight:600;font-size:13px">${s.clientName||'—'} ${isTc?'<span style="font-size:10px;background:var(--purple-dim);color:var(--purple);padding:1px 5px;border-radius:3px;font-weight:700">📋</span>':''}</div><div style="font-size:12px;color:var(--muted)">${s.trainerName||'—'} · ${s.type||'—'}</div></div>${statusBadge(s.status)}<div style="display:flex;gap:4px;flex-wrap:wrap">${canStart&&s.status==='not-started'?`<button class="btn btn-gr btn-sm" onclick="markSessionStatus('${s.id}','onair')">▶</button>`:''}${canStart&&s.status==='onair'?`<button class="btn btn-p btn-sm" onclick="markSessionStatus('${s.id}','completed')">✓</button><button class="btn btn-d btn-sm" onclick="markSessionStatus('${s.id}','missed')">✗</button>`:''}${wl&&canStart?`<a href="${wl}" target="_blank" style="font-size:18px;text-decoration:none;padding:2px">💬</a>`:''}</div></div>`}).join('')}</div>`
}

// ══ LEADERBOARD ══
function buildLeaderboard(trainers,allRatings,allClients){return trainers.map(t=>{const tR=allRatings.filter(r=>r.trainerId===t.id);const avg=tR.length?avgRating(tR):0;const tC=allClients.filter(c=>c.trainerId===t.id).length;return{...t,avg,totalRatings:tR.length,clientCount:tC}}).sort((a,b)=>b.avg-a.avg||b.totalRatings-a.totalRatings)}
function renderLeaderboard(ranked){if(!ranked.length)return emptyState('🏆','No ratings yet','','','');const medals=['🥇','🥈','🥉'];const rC=['gold','silver','bronze','other'];const sc={5:'var(--accent)',4:'#88cc00',3:'var(--yellow)',2:'#ff7700',1:'#ff4444',0:'var(--muted)'};return`<div>${ranked.map((t,i)=>{const ini=(t.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);const col=sc[Math.round(t.avg)]||'var(--muted)';return`<div class="lb-row"><div class="lb-rank ${rC[i]||'other'}">${i+1}</div><div style="font-size:20px">${medals[i]||''}</div><div style="width:36px;height:36px;border-radius:50%;background:var(--green-dim);color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${ini}</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">${t.name||'—'}</div><div style="font-size:11px;color:var(--muted)">${t.clientCount} clients · ${t.totalRatings} ratings</div></div><div style="text-align:right"><div style="font-size:16px;color:${col}">${starsHtml(t.avg)}</div><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:${col}">${t.avg.toFixed(1)}</div></div></div>`}).join('')}</div>`}

function renderOldClients(inactive,batches){if(!inactive.length)return`<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">🎉 No inactive clients</div>`;return inactive.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"><div style="width:34px;height:34px;border-radius:50%;background:var(--red-dim);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${(c.name||'?')[0].toUpperCase()}</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">${c.name||'—'}</div><div style="font-size:11px;color:var(--muted)">${c.trainerName||'No trainer'} · ${c.phone||'—'}</div></div>${planBadge(c.plan)}<button class="btn btn-g btn-sm" onclick="reactivateClient('${c.id}')">Reactivate</button></div>`).join('')}

// ══ SESSION STATUS ══
async function markSessionStatus(id,status,skipRate=false){
  if(id&&id.startsWith('tc_')){const tcId=id.replace('tc_','');try{await fsUpdate('timechart',tcId,{todayStatus:status,lastStatusUpdate:new Date().toISOString().split('T')[0]});toast(`Status: ${status}`,'success');dash()}catch(e){toast('Error','error')}return}
  try{
    await fsUpdate('sessions',id,{status});toast(`Session: ${status}`,'success');
    if(status==='completed'&&!skipRate&&(CR==='coordinator'||CR==='coordinatorhead')){const sess=await fsGet('sessions',id);if(sess?.trainerId)showQuickRateOverlay(id,sess.trainerId,sess.trainerName,sess.type||'Session',sess.date||'')}
    if(status==='missed'){
      const sess=await fsGet('sessions',id);if(!sess)return;
      let coordIds=[];if(sess.clientId){const client=await fsGet('clients',sess.clientId);if(client?.coordinatorId)coordIds=[client.coordinatorId]}
      const[heads,admins]=await Promise.all([fsGetAll('users',fn().where('role','==','coordinatorhead')),fsGetAll('users',fn().where('role','==','admin'))]);
      const targets=[...new Set([...coordIds,...heads.map(h=>h.id),...admins.map(a=>a.id)])];
      const reqRef=await fsAdd('missedreasonrequests',{sessionId:id,clientName:sess.clientName||'',trainerName:sess.trainerName||'',date:sess.date||'',time:sess.time||'',markedBy:auth().currentUser.uid,markedByName:CU.name||'',assignedCoordIds:targets,resolved:false});
      const myUid=auth().currentUser.uid;const alertMsg=`⚠️ MISSED SESSION\nClient: ${sess.clientName||'—'}\nTrainer: ${sess.trainerName||'—'}\nTime: ${to12h(sess.time)} on ${sess.date}\nBy: ${CU.name||'—'}`;
      await Promise.all(targets.filter(uid=>uid!==myUid).map(async uid=>{const chatId=getChatId(myUid,uid);try{await fn().addDoc(fn().collection(db(),`chats/${chatId}/messages`),{senderId:myUid,senderName:CU.name||'',message:alertMsg,timestamp:fn().serverTimestamp(),read:false,type:'missed_session_alert'});await fn().setDoc(fn().doc(db(),'chats',chatId),{participants:[myUid,uid],lastMessage:`⚠️ Missed: ${sess.clientName}`,lastMessageTime:fn().serverTimestamp(),lastSenderId:myUid},{merge:true})}catch(e){}}));
      await createNotifForUsers({title:'⚠️ Session Missed',body:`${sess.clientName||'Client'} missed session at ${to12h(sess.time)} on ${sess.date}`,type:'missed_session'},targets);
      if(CR==='coordinator'||CR==='coordinatorhead')setTimeout(()=>showMissedReasonPopup(id,sess.clientName||'',sess.trainerName||'',sess.date||'',sess.time||'',reqRef?.id||''),500);
    }
    const active=document.querySelector('.ni.active')?.id?.replace('ni-','');
    if(active==='dash')dash();else if(active==='sessions')sessions();
  }catch(e){toast('Error: '+e.message,'error')}
}

// ══ QUICK RATE ══
function showQuickRateOverlay(sessionId,trainerId,trainerName,sessionType,sessionDate){const ex=$('quick-rate-overlay');if(ex)ex.remove();const o=document.createElement('div');o.id='quick-rate-overlay';o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:1100;display:flex;align-items:flex-end;justify-content:center;padding:0';o.innerHTML=`<div style="background:var(--card);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto"><div style="text-align:center;margin-bottom:16px"><div style="font-size:30px">⭐</div><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px">RATE THIS SESSION</div><div style="font-size:13px;color:var(--muted);margin-top:4px">Trainer: <strong style="color:var(--text)">${trainerName}</strong></div></div><div style="text-align:center;margin-bottom:16px"><div style="display:flex;gap:8px;justify-content:center" id="qr-stars">${[1,2,3,4,5].map(n=>`<button class="star-btn" data-val="${n}" onclick="qrSetStar(${n})" style="font-size:36px">★</button>`).join('')}</div><div id="qr-lbl" style="font-size:16px;font-weight:700;min-height:24px;margin-top:8px;color:var(--muted)">Tap to rate</div></div><input type="hidden" id="qr-rating" value="0"><div class="fg"><label class="fl">Comment</label><textarea class="fta" id="qr-comment" placeholder="Great session…" style="min-height:60px"></textarea></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-g" style="flex:1" onclick="document.getElementById('quick-rate-overlay').remove()">Skip</button><button class="btn btn-p" style="flex:1" id="qr-submit-btn" onclick="submitQuickRate('${sessionId}','${trainerId}','${trainerName}','${sessionType}','${sessionDate}')" disabled>Submit</button></div></div>`;document.body.appendChild(o)}
function qrSetStar(n){$('qr-rating').value=n;const labels=['','😞 Poor','😐 Fair','🙂 Good','😊 Great','🌟 Excellent!'];const colors=['','#ff4444','#ff7700','var(--yellow)','#88cc00','var(--accent)'];$('qr-stars').querySelectorAll('.star-btn').forEach((b,i)=>{b.classList.toggle('active',i<n);b.style.color=i<n?colors[n]:''});$('qr-lbl').textContent=labels[n]||'';$('qr-lbl').style.color=colors[n]||'';const sb=$('qr-submit-btn');if(sb)sb.disabled=n===0}
async function submitQuickRate(sessionId,trainerId,trainerName,sessionType,sessionDate){const rating=Number($('qr-rating').value||0);if(!rating){toast('Rate first','error');return}try{await fsAdd('trainerratings',{trainerId,trainerName,rating,criteria:{},comment:$('qr-comment')?.value.trim()||'',sessionId,sessionType,sessionDate,ratedById:auth().currentUser.uid,ratedByName:CU.name||'',ratedByRole:CR});document.getElementById('quick-rate-overlay')?.remove();toast('Rating submitted! 🌟','success')}catch(e){toast('Error','error')}}

// ══ SESSIONS ══
async function sessions(){
  $('page').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;
  let coordClientIds=null;
  if(CR==='coordinator'){const myUid=auth().currentUser.uid;const mc=await fsGetAll('clients',fn().where('coordinatorId','==',myUid));coordClientIds=mc.map(c=>c.id)}
  async function loadSTab(tab){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelector(`.tab[data-stab="${tab}"]`)?.classList.add('active');
    $('sess-list').innerHTML=`<div style="padding:30px;text-align:center;color:var(--muted)"><div class="spin" style="width:22px;height:22px;margin:0 auto"></div></div>`;
    let q=[];if(CR==='trainer')q=[fn().where('trainerId','==',auth().currentUser.uid)];if(CR==='client')q=[fn().where('clientId','==',auth().currentUser.uid)];
    let data=await fsGetAll('sessions',...q);
    if(CR==='coordinator'&&coordClientIds)data=data.filter(s=>coordClientIds.includes(s.clientId));
    const today=new Date();today.setHours(0,0,0,0);
    if(tab==='today')data=data.filter(s=>{const d=s.date?new Date(s.date):null;if(!d)return false;d.setHours(0,0,0,0);return d.getTime()===today.getTime()});
    else if(tab==='upcoming')data=data.filter(s=>{const d=s.date?new Date(s.date):null;if(!d)return false;d.setHours(0,0,0,0);return d.getTime()>today.getTime()});
    else if(tab==='past')data=data.filter(s=>{const d=s.date?new Date(s.date):null;if(!d)return false;d.setHours(0,0,0,0);return d.getTime()<today.getTime()});
    data.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||'').localeCompare(b.time||''));
    if(!data.length){$('sess-list').innerHTML=emptyState('📅',`No ${tab} sessions`,CR!=='client'?'Schedule sessions for your clients.':'','',``);return}
    $('sess-list').innerHTML=`<table><thead><tr><th>Date</th><th>Time</th><th>Client</th><th>Trainer</th><th>Type</th><th>Status</th><th>Meet</th><th>WA</th><th>Actions</th></tr></thead><tbody>${data.map(s=>{const wl=waLink(s.clientPhone||'',`Hi ${s.clientName}! Reminder: your session is ${s.date} at ${to12h(s.time)} 💪`);return`<tr><td style="font-size:12px">${s.date||'—'}</td><td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)">${to12h(s.time)}</td><td><strong>${s.clientName||'—'}</strong></td><td style="font-size:12px">${s.trainerName||'—'}</td><td style="font-size:12px">${s.type||'—'}</td><td>${statusBadge(s.status)}</td><td>${s.meetLink?`<a href="${s.meetLink}" target="_blank" class="badge b-b" style="text-decoration:none">Join</a>`:'—'}</td><td>${wl?`<a href="${wl}" target="_blank" style="font-size:18px;text-decoration:none">💬</a>`:'—'}</td><td><div class="td-actions">${CR!=='client'&&s.status==='not-started'?`<button class="btn btn-gr btn-sm" onclick="markSessionStatus('${s.id}','onair',true)">▶</button>`:''}${(CR==='coordinator'||CR==='coordinatorhead')&&s.status==='onair'?`<button class="btn btn-p btn-sm" onclick="markSessionStatus('${s.id}','completed')">✓</button><button class="btn btn-d btn-sm" onclick="markSessionStatus('${s.id}','missed')">✗</button>`:''}${CR==='admin'&&s.status==='onair'?`<button class="btn btn-p btn-sm" onclick="markSessionStatus('${s.id}','completed',true)">✓</button><button class="btn btn-d btn-sm" onclick="markSessionStatus('${s.id}','missed')">✗</button>`:''}${CR==='trainer'&&(s.status==='onair'||s.status==='not-started')?`<button class="btn btn-p btn-sm" onclick="markSessionStatus('${s.id}','completed',true)">✓</button><button class="btn btn-d btn-sm" onclick="markSessionStatus('${s.id}','missed',true)">✗</button>`:''}${CR==='admin'||CR==='coordinator'||CR==='coordinatorhead'?`<button class="btn btn-g btn-sm" onclick="openEditSession('${s.id}')">Edit</button><button class="btn btn-d btn-sm" onclick="delSession('${s.id}')">Del</button>`:''}${(CR==='coordinator'||CR==='coordinatorhead')&&s.status==='completed'?`<button class="btn btn-yw btn-sm" onclick="openRateTrainer('${s.trainerId||''}','${(s.trainerName||'').replace(/'/g,"\\'")}')">⭐</button>`:''}
      </div></td></tr>`}).join('')}</tbody></table>`;
  }
  $('page').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px"><div class="tabs" style="margin:0;border:none">${['today','upcoming','past','all'].map(t=>`<div class="tab ${t==='today'?'active':''}" data-stab="${t}" onclick="window._sTab('${t}')">${t[0].toUpperCase()+t.slice(1)}</div>`).join('')}</div>${CR!=='client'?`<button class="btn btn-p" onclick="openAddSession()">+ Session</button>`:''}</div><div class="card" style="padding:0"><div class="tbl-wrap" id="sess-list"></div></div>`;
  window._sTab=loadSTab;loadSTab('today');
}

async function saveClient(existingId=''){const name=$('cf-name').value.trim(),phone=$('cf-phone').value.trim();if(!name||!phone){toast('Name and phone required','error');return}const plan=$('cf-plan').value;const trainerId=$('cf-trainer-id')?.value||'';const trainerName=($('cf-trainer-inp')?.value||'').replace(/\s*\([^)]*\)\s*$/,'').trim();const coordinatorId=$('cf-coord-id')?.value||'';const coordinatorName=$('cf-coord-inp')?.value.trim()||'';const data={name,phone,email:$('cf-email').value.trim(),plan,trainerId,trainerName,coordinatorId,coordinatorName,gender:$('cf-gender').value,goal:$('cf-goal').value,weight:$('cf-weight').value,height:$('cf-height').value,startDate:$('cf-start').value,endDate:$('cf-end').value,medical:$('cf-med').value,active:$('cf-active').value==='true',sessionsPerWeek:$('cf-spw').value,company:$('cf-company').value.trim(),country:$('cf-country')?.value.trim()||'',age:Number($('cf-age')?.value)||null,addedBy:auth().currentUser.uid};if(plan==='Couple'){data.partnerName=$('cf-partner-name')?.value.trim()||'';data.partnerPhone=$('cf-partner-phone')?.value.trim()||'';}try{if(existingId){await fsUpdate('clients',existingId,data);toast('Updated!','success')}else{await fsAdd('clients',data);toast('Client added!','success')}closeM2();clients()}catch(e){toast('Error: '+e.message,'error')}}
async function viewClient(id){const c=await fsGet('clients',id);if(!c){toast('Not found','error');return}const[sessions,attendance,progress,payments]=await Promise.all([fsGetAll('sessions',fn().where('clientId','==',id)),fsGetAll('attendance',fn().where('clientId','==',id)),fsGetAll('progresslogs',fn().where('clientId','==',id)),fsGetAll('payments',fn().where('clientId','==',id))]);const present=attendance.filter(a=>a.status==='present').length;const rate=attendance.length?Math.round(present/attendance.length*100):0;const latestP=progress.sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0]||{};const totalPaid=payments.filter(p=>p.status==='paid').reduce((s,p)=>s+Number(p.amount||0),0);const wl=waLink(c.phone,`Hi ${c.name}! 💪 Gym At Your Home`);openM2(`CLIENT: ${(c.name||'').toUpperCase()}`,`<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap"><div class="sc sc-g" style="margin:0;padding:12px;flex:1"><div class="sc-lbl">Attendance</div><div style="font-size:24px;font-weight:700">${rate}%</div></div><div class="sc sc-a" style="margin:0;padding:12px;flex:1"><div class="sc-lbl">Total Paid</div><div style="font-size:20px;font-weight:700">${fmtCurrency(totalPaid)}</div></div>${latestP.weight?`<div class="sc sc-b" style="margin:0;padding:12px;flex:1"><div class="sc-lbl">Weight</div><div style="font-size:24px;font-weight:700">${latestP.weight} kg</div></div>`:''}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-bottom:14px"><div><span style="color:var(--muted)">Phone:</span> ${c.phone||'—'}</div><div><span style="color:var(--muted)">Email:</span> ${c.email||'—'}</div><div><span style="color:var(--muted)">Plan:</span> ${c.plan||'—'}</div><div><span style="color:var(--muted)">Trainer:</span> ${c.trainerName||'—'}</div><div><span style="color:var(--muted)">Goal:</span> ${c.goal||'—'}</div><div><span style="color:var(--muted)">Sessions/Wk:</span> ${c.sessionsPerWeek||'—'}</div></div>${wl?`<a href="${wl}" target="_blank" class="btn btn-wa btn-w" style="margin-bottom:12px">💬 Open WhatsApp Chat</a>`:''}<div class="mo-foot"><button class="btn btn-g" onclick="closeM2();openAddProgress('${id}','${(c.name||'').replace(/'/g,"\\'")}')">📊 Log Progress</button><button class="btn btn-g" onclick="closeM2();openEditClient('${id}')">Edit</button><button class="btn btn-g" onclick="closeM2()">Close</button></div>`)}

function renderUsersTable(data){if(!data.length)return emptyState('👥','No users','','+ Add User','openAddUser()');return`<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody>${data.map(u=>`<tr><td><strong>${u.name||'—'}</strong></td><td style="font-size:12px">${u.email||'—'}</td><td><span class="badge ${u.role==='admin'?'b-p':u.role==='coordinatorhead'?'b-o':u.role==='coordinator'?'b-b':u.role==='trainer'?'b-g':'b-y'}">${u.role||'—'}</span></td><td>${u.active!==false?`<span class="badge b-g">Active</span>`:`<span class="badge b-r">Inactive</span>`}</td><td><div class="td-actions"><button class="btn btn-g btn-sm" onclick="openEditUser('${u.id}')">Edit</button>${u.id!==auth().currentUser.uid?`<button class="btn btn-d btn-sm" onclick="delUser('${u.id}')">Del</button>`:'<span style="font-size:11px;color:var(--muted)">(you)</span>'}</div></td></tr>`).join('')}</tbody></table>`}

async function createUser(){const name=$('uf-name').value.trim(),role=$('uf-role').value,email=$('uf-email').value.trim(),pwd=$('uf-pwd').value,errEl=$('uf-err');errEl.classList.remove('show');if(!name||!role||!email||!pwd){errEl.textContent='All fields required.';errEl.classList.add('show');return}if(pwd.length<6){errEl.textContent='Password min 6 chars.';errEl.classList.add('show');return}try{const cred=await fn().createUserWithEmailAndPassword(window.FB.auth2,email,pwd);await fn().signOut(window.FB.auth2);await fn().setDoc(fn().doc(db(),'users',cred.user.uid),{name,email,role,gender:$('uf-gender').value,phone:$('uf-phone').value.trim(),active:true,createdAt:fn().serverTimestamp()});closeM1();toast(`User "${name}" created!`,'success');users()}catch(e){errEl.textContent=e.message.includes('email-already-in-use')?'Email already registered.':e.message.replace('Firebase:','').replace(/\(auth.*\)/,'').trim();errEl.classList.add('show')}}

async function trainers(){$('page').innerHTML=`<div style="text-align:center;padding:40px"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;const[data,clientData,allRatings]=await Promise.all([fsGetAll('users',fn().where('role','==','trainer')),fsGetAll('clients',fn().where('active','==',true)),fsGetAll('trainerratings')]);$('page').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">${CR==='admin'||CR==='coordinatorhead'?`<button class="btn btn-p" onclick="openAddUser()">+ Add Trainer</button>`:''}<span style="color:var(--muted);font-size:13px">${data.length} trainers</span></div><div class="card" style="padding:0"><div class="tbl-wrap">${data.length===0?emptyState('🧑‍🏫','No trainers','','',''):`<table><thead><tr><th>Trainer</th><th>Gender</th><th>Clients</th><th>Rating</th><th>WhatsApp</th><th>Status</th><th>Actions</th></tr></thead><tbody>${data.map(t=>{const mc=clientData.filter(c=>c.trainerId===t.id).length;const tR=allRatings.filter(r=>r.trainerId===t.id);const avg=tR.length?avgRating(tR):0;const col=['#888','#ff4444','#ffbb00','#ffbb00','#00e676','#d4ff00'][Math.round(avg)]||'#888';const wl=waLink(t.phone||'');return`<tr><td><strong>${t.name||'—'}</strong><div style="font-size:11px;color:var(--muted)">${t.email||''}</div></td><td style="font-size:12px">${t.gender||'—'}</td><td>${mc}</td><td>${tR.length?`<span style="color:${col}">★ ${avg.toFixed(1)}</span><span style="font-size:11px;color:var(--muted)"> (${tR.length})</span>`:'<span style="color:var(--muted2)">—</span>'}</td><td>${wl?`<a href="${wl}" target="_blank" class="wa-btn">💬</a>`:'—'}</td><td>${t.active!==false?`<span class="badge b-g">Active</span>`:`<span class="badge b-r">Inactive</span>`}</td><td><div class="td-actions">${CR==='admin'||CR==='coordinatorhead'?`<button class="btn btn-g btn-sm" onclick="openEditUser('${t.id}')">Edit</button>`:''}</div></td></tr>`}).join('')}</tbody></table>`}</div></div>`}
async function coordinators(){$('page').innerHTML=`<div style="text-align:center;padding:40px"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;const[coordData,headData,followups,clients]=await Promise.all([fsGetAll('users',fn().where('role','==','coordinator')),fsGetAll('users',fn().where('role','==','coordinatorhead')),fsGetAll('followups'),fsGetAll('clients',fn().where('active','==',true))]);const allStaff=[...headData.map(u=>({...u,_label:'Coordinator Head'})),...coordData.map(u=>({...u,_label:'Coordinator'}))];$('page').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">${CR==='admin'?`<button class="btn btn-p" onclick="openAddUser()">+ Add Staff</button>`:''}<span style="color:var(--muted);font-size:13px">${allStaff.length} staff</span></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">${allStaff.map(u=>{const rc=roleColor(u.role);const myFU=followups.filter(f=>f.assignedTo===u.id||f.assignedToId===u.id);const pendFU=myFU.filter(f=>!f.done&&f.status!=='completed').length;const myClients=clients.filter(c=>c.coordinatorId===u.id);const ini=(u.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);const wl=waLink(u.phone||'');return`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="width:40px;height:40px;border-radius:50%;background:${rc}20;color:${rc};display:flex;align-items:center;justify-content:center;font-weight:700">${ini}</div><div><div style="font-weight:700;font-size:14px">${u.name||'—'}</div><span class="badge ${u.role==='coordinatorhead'?'b-o':'b-b'}" style="font-size:10px">${u._label}</span></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px"><div style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px;t // ══ TRAINER RATINGS ══
async function trainerratings(){
  $('page').innerHTML=`<div style="text-align:center;padding:40px"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;
  let allowedIds=null;if(CR==='coordinator'){const myUid=auth().currentUser.uid;const mc=await fsGetAll('clients',fn().where('coordinatorId','==',myUid));allowedIds=[...new Set(mc.map(c=>c.trainerId).filter(Boolean))]}
  const[allTrainers,ratings]=await Promise.all([fsGetAll('users',fn().where('role','==','trainer')),fsGetAll('trainerratings')]);
  const trainers=CR==='coordinator'&&allowedIds?allTrainers.filter(t=>allowedIds.includes(t.id)):allTrainers;
  const ranked=buildLeaderboard(trainers,ratings,[]);

  const myUid=window._chatMyUid||auth().currentUser.uid;

  window._activeChatId=chatId;window._activeChatContactId=contactId;
  const rc=roleColorForChat(rawRole);
  $('chat-main').innerHTML=`

    </div>

      <textarea class="chat-input" id="chat-inp" placeholder="Type a message… (Enter to send)" rows="1" onkeydown="chatEnterSend(event,'${chatId}','${myUid}','${contactId}')"></textarea>
      <button class="btn btn-p" onclick="sendChatMsg('${chatId}','${myUid}','${contactId}')">Send</button>
    </div>`;
  if(_chatUnsub){_chatUnsub();_chatUnsub=null}
  try{
    const msgsRef=fn().collection(db(),`chats/${chatId}/messages`);
    const q=fn().query(msgsRef,fn().orderBy('timestamp','asc'));

      const msgs=$('chat-msgs');if(!msgs)return;

    });
  }catch(e){const msgs=$('chat-msgs');if(msgs)msgs.innerHTML=`<div style="padding:20px;color:var(--red);font-size:13px">⚠️ ${e.message}</div>`}

async function markMsgsRead(chatId,myUid){try{const msgsRef=fn().collection(db(),`chats/${chatId}/messages`);const q=fn().query(msgsRef,fn().where('senderId','!=',myUid),fn().where('read','==',false));const snap=await fn().getDocs(q);const updates=[];snap.forEach(doc=>updates.push(fn().updateDoc(doc.ref,{read:true})));await Promise.all(updates)}catch(e){}}
async function sendChatMsg(chatId,myUid,contactId){
  const inp=$('chat-inp');if(!inp)return;const message=inp.value.trim();if(!message)return;inp.value='';inp.style.height='auto';

  const preEnrolled=clientsSel?Array.from(clientsSel.selectedOptions).map(o=>o.value).filter(v=>v):[];
  const existingBatch=existingId?await fsGet('batches',existingId):null;
  const mergedEnrolled=[...new Set([...(existingBatch?.enrolledClients||[]),...preEnrolled])];
  const data={batchName:name,trainerId,trainerName,sessionType,schedule,maxCapacity:maxCap,company,plan,enrolledClients:mergedEnrolled};
  try{
    if(existingId){await fsUpdate('batches',existingId,data);toast('Updated!','success');closeM1()}
    else{await fsAdd('batches',data);toast('Created!','success');closeM2()}
    batches();
  }catch(e){toast('Error: '+e.message,'error')}
}
async function addClientToBatch(batchId,batchName){
  const clients=await fsGetAll('clients',fn().where('active','==',true));
  const b=await fsGet('batches',batchId);const already=b?.enrolledClients||[];
  const available=clients.filter(c=>!already.includes(c.id));
  openM1(`ADD CLIENT TO: ${batchName.toUpperCase()}`,`
    <div class="fg"><label class="fl">Select Client *</label><select class="fs" id="atb-client"><option value="">— Select —</option>${available.map(c=>`<option value="${c.id}">${c.name} (${c.plan||'—'})</option>`).join('')}</select></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM1()">Cancel</button><button class="btn btn-p" onclick="saveAddClientToBatch('${batchId}')">Add</button></div>`);
}
async function saveAddClientToBatch(batchId){
  const clientSel=$('atb-client');const clientId=clientSel.value;
  if(!clientId){toast('Select a client','error');return}
  try{const b=await fsGet('batches',batchId);const enrolled=b?.enrolledClients||[];if(enrolled.includes(clientId)){toast('Already enrolled','info');return}if(enrolled.length>=(b?.maxCapacity||10)){toast('At max capacity','error');return}await fn().updateDoc(fn().doc(db(),'batches',batchId),{enrolledClients:[...enrolled,clientId]});closeM1();toast('Client added!','success');batches()}catch(e){toast('Error: '+e.message,'error')}
}
async function delBatch(id){if(!confirm('Delete?'))return;try{await fsDel('batches',id);toast('Deleted','success');batches()}catch(e){toast('Error','error')}}

// ── BADGE HELPERS ─────────────────────────────────────────────
function statusBadge(s){
  const map={onair:`<span class="badge b-g"><span class="dot dot-g"></span>On Air</span>`,'not-started':`<span class="badge b-y"><span class="dot dot-y"></span>Pending</span>`,missed:`<span class="badge b-r"><span class="dot dot-r"></span>Missed</span>`,completed:`<span class="badge b-gray">✓ Done</span>`,present:`<span class="badge b-g">✅ Present</span>`,absent:`<span class="badge b-r">❌ Absent</span>`,late:`<span class="badge b-y">⏰ Late</span>`};
  return map[s]||`<span class="badge b-gray">${s||'—'}</span>`;
}
function planBadge(p){
  if(!p)return`<span class="badge b-gray">—</span>`;
  if(p==='Gold')return`<span class="badge b-y">🥇 Gold</span>`;
  if(p==='Platinum')return`<span class="badge b-p">💎 Platinum</span>`;
  if(p==='Platinum Plus')return`<span class="badge b-p">💎+ Plat+</span>`;
  if(p==='Corporate Fitness')return`<span class="badge b-b">🏢 Corporate</span>`;
  return`<span class="badge b-gray">🥈 Silver</span>`;
}

// ── FIREBASE INIT ─────────────────────────────────────────────
document.addEventListener('fbReady',()=>{
  initTheme();
  const{onAuthStateChanged}=window.FN;
  onAuthStateChanged(window.FB.auth,async user=>{
    await new Promise(r=>setTimeout(r,1600));
    $('loader').classList.add('out');
    if(user){
      try{
        const uDoc=await fsGet('users',user.uid);
        if(uDoc&&uDoc.role){CU=uDoc;CR=uDoc.role;startApp()}
        else{await window.FN.signOut(window.FB.auth);$('login-page').style.display='flex'}
      }catch(e){$('login-page').style.display='flex'}
    }else{$('login-page').style.display='flex'}
  });
});
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&$('login-page').style.display==='flex')doLogin()});
</script>
