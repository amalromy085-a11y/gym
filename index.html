<style>
:root {
  --bg:#0b0b0b;--surface:#141414;--card:#1c1c1c;--border:#272727;--border2:#333;
  --text:#f0f0eb;--muted:#888;--muted2:#555;
  --accent:#d4ff00;--accent-dim:rgba(212,255,0,0.1);
  --green:#00e676;--green-dim:rgba(0,230,118,0.12);
  --red:#ff4444;--red-dim:rgba(255,68,68,0.12);
  --yellow:#ffbb00;--yellow-dim:rgba(255,187,0,0.12);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.12);
  --purple:#aa66ff;--purple-dim:rgba(170,102,255,0.12);
  --orange:#ff8c00;--orange-dim:rgba(255,140,0,0.12);
  --sw:250px;
}
body.light-theme {
  --bg:#f4f4f0;--surface:#ffffff;--card:#fafafa;--border:#e0e0e0;--border2:#d0d0d0;
  --text:#1a1a1a;--muted:#666;--muted2:#999;
  --accent:#5a9e00;--accent-dim:rgba(90,158,0,0.1);
  --green:#00a050;--green-dim:rgba(0,160,80,0.12);
  --red:#cc2222;--red-dim:rgba(204,34,34,0.12);
  --yellow:#cc8800;--yellow-dim:rgba(204,136,0,0.12);
  --blue:#2266cc;--blue-dim:rgba(34,102,204,0.12);
  --purple:#7733cc;--purple-dim:rgba(119,51,204,0.12);
  --orange:#cc5500;--orange-dim:rgba(204,85,0,0.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loader.out{opacity:0;pointer-events:none}
.ld-logo{width:80px;height:80px;object-fit:contain;margin-bottom:20px;animation:ldpulse 1.4s ease-in-out infinite}
.ld-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;margin-bottom:24px;color:var(--text)}
.ld-bar{width:180px;height:2px;background:var(--border2);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--accent);animation:ldfill 1.6s ease forwards}
@keyframes ldpulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ldfill{from{width:0}to{width:100%}}
#login-page{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse 70% 50% at 80% 10%,rgba(212,255,0,.06) 0,transparent 60%),
             radial-gradient(ellipse 50% 70% at 5% 90%,rgba(77,159,255,.05) 0,transparent 60%),var(--bg)}
.lc{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.3)}
.lc-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.lc-logo img{width:48px;height:48px;object-fit:contain;border-radius:10px}
.lc-brand{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.1}
.lc-brand small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase}
.lc h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:4px}
.lc p{color:var(--muted);font-size:13px;margin-bottom:28px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.fi,.fs,.fta{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent)}
.fs option{background:var(--surface)}
.fta{resize:vertical;min-height:76px}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fl{display:block;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.alert.show{display:block}
.alert-err{background:var(--red-dim);border:1px solid rgba(255,68,68,.3);color:var(--red)}
.alert-ok{background:var(--green-dim);border:1px solid rgba(0,230,118,.3);color:var(--green)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;text-decoration:none;white-space:nowrap}
.btn-p{background:var(--accent);color:#000}.btn-p:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-d{background:var(--red);color:#fff}.btn-d:hover{filter:brightness(1.1)}
.btn-g{background:transparent;color:var(--text);border:1px solid var(--border2)}.btn-g:hover{border-color:var(--accent);color:var(--accent)}
.btn-gr{background:var(--green);color:#000}.btn-gr:hover{filter:brightness(1.1)}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-w{width:100%}
.btn-yw{background:var(--yellow);color:#000}
.btn-or{background:var(--orange);color:#fff}
.btn-pu{background:var(--purple);color:#fff}
.btn-bl{background:var(--blue);color:#fff}
#app{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sw);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transition:transform .28s;overflow:hidden}
.sb-head{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo{width:36px;height:36px;object-fit:contain;border-radius:8px;flex-shrink:0}
.sb-brand{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.8px;line-height:1.2}
.sb-brand small{display:block;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.sb-user{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ua{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.un{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ur{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;display:inline-block;margin-top:2px}
.r-admin{background:var(--purple-dim);color:var(--purple)}
.r-coordinator{background:var(--blue-dim);color:var(--blue)}
.r-coordinatorhead{background:var(--orange-dim);color:var(--orange)}
.r-trainer{background:var(--green-dim);color:var(--green)}
.r-client{background:var(--yellow-dim);color:var(--yellow)}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.sb-nav::-webkit-scrollbar{width:4px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.nav-sec{padding:0 16px;margin-top:4px}
.nav-sec-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:8px 0 4px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-left:2px solid transparent;transition:all .15s}
.ni:hover{background:rgba(128,128,128,.08);color:var(--text)}
.ni.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent)}
.ni-ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-foot{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.main{margin-left:var(--sw);flex:1;min-height:100vh;background:var(--bg)}
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;position:sticky;top:0;z-index:50;gap:14px}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;flex:1}
.tb-date{font-size:12px;color:var(--muted)}
.notif-btn,.theme-btn{background:transparent;border:1px solid var(--border2);border-radius:7px;padding:7px 9px;cursor:pointer;color:var(--text);font-size:14px;transition:border-color .2s;position:relative}
.notif-btn:hover,.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.ndot{position:absolute;top:5px;right:5px;width:6px;height:6px;background:var(--red);border-radius:50%}
.mob-menu{display:none;background:transparent;border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:7px;cursor:pointer;font-size:17px}
.page{padding:22px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:700;letter-spacing:.3px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:18px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc-a::before{background:var(--accent)}.sc-g::before{background:var(--green)}.sc-r::before{background:var(--red)}.sc-b::before{background:var(--blue)}.sc-p::before{background:var(--purple)}.sc-y::before{background:var(--yellow)}.sc-o::before{background:var(--orange)}
.sc-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.sc-val{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1}
.sc-sub{font-size:11px;color:var(--muted);margin-top:3px}
.sc-ico{position:absolute;right:14px;top:14px;font-size:24px;opacity:.12}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 13px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:rgba(128,128,128,.04)}
tbody td{padding:11px 13px;border-bottom:1px solid rgba(128,128,128,.06);vertical-align:middle}
tbody tr:hover{background:rgba(128,128,128,.04)}
tbody tr:last-child td{border-bottom:none}
.td-actions{display:flex;gap:5px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.b-g{background:var(--green-dim);color:var(--green)}.b-y{background:var(--yellow-dim);color:var(--yellow)}.b-r{background:var(--red-dim);color:var(--red)}.b-b{background:var(--blue-dim);color:var(--blue)}.b-p{background:var(--purple-dim);color:var(--purple)}.b-gray{background:rgba(128,128,128,.12);color:var(--muted)}.b-a{background:var(--accent-dim);color:var(--accent)}.b-o{background:var(--orange-dim);color:var(--orange)}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.dot-g{background:var(--green);animation:blink 1.4s infinite}.dot-y{background:var(--yellow)}.dot-r{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(3px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.mb{background:var(--card);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:26px;animation:moslide .2s ease}
.mb-lg{max-width:760px}.mb-xl{max-width:960px}
@keyframes moslide{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mo-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.mo-x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:3px;transition:color .2s}
.mo-x:hover{color:var(--text)}
.mo-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.4}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--muted)}
.empty-sub{font-size:13px;color:var(--muted2);margin-bottom:20px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;color:var(--muted)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;min-width:260px;max-width:360px;display:flex;align-items:center;gap:9px;font-size:13px;animation:tslide .25s ease;box-shadow:0 6px 24px rgba(0,0,0,.3)}
.toast-ok{border-left:3px solid var(--green)}.toast-err{border-left:3px solid var(--red)}.toast-info{border-left:3px solid var(--blue)}
@keyframes tslide{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.chart-box{position:relative;height:210px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:18px}
.chat-layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 120px);gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--card)}
.chat-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.chat-search{padding:12px;border-bottom:1px solid var(--border)}
.chat-list{flex:1;overflow-y:auto}
.chat-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid rgba(128,128,128,.05);transition:background .15s;display:flex;align-items:center;gap:10px}
.chat-item:hover{background:rgba(128,128,128,.06)}
.chat-item.active{background:var(--accent-dim);border-left:2px solid var(--accent)}
.chat-item-name{font-size:13px;font-weight:600}
.chat-main{display:flex;flex-direction:column}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:70%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5}
.msg-out{align-self:flex-end;background:var(--accent);color:#000;border-bottom-right-radius:3px}
.msg-in{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:3px}
.msg-meta{font-size:10px;margin-top:3px;opacity:.6;text-align:right}
.msg-in .msg-meta{text-align:left}
.chat-input-area{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:none;min-height:40px;max-height:100px}
.chat-input:focus{border-color:var(--accent)}
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:height:100%;color:var(--muted);gap:10px}
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.slot-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;transition:border-color .2s}
.slot-card.full{border-color:var(--red);opacity:.7}
.slot-time{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--accent)}
.slot-trainer{font-size:12px;color:var(--muted);margin-top:3px}
.slot-cap{font-size:11px;margin-top:5px}
.slot-tag{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;display:inline-block;margin-top:6px}
.slot-tag-f{background:var(--purple-dim);color:var(--purple)}
.batch-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.batch-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.batch-name{font-weight:700;font-size:14px}
.batch-clients{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.batch-client-tag{background:var(--accent-dim);color:var(--accent);font-size:11px;padding:2px 8px;border-radius:20px}
.pb-wrap{margin-bottom:10px}
.pb-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.pb{height:5px;background:var(--border2);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .6s ease}
#mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
#mob-ov.open{display:block}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.detail-section{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.detail-section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.stars{display:flex;gap:3px;align-items:center}
.star{font-size:20px;cursor:pointer;transition:transform .1s;user-select:none}
.star:hover{transform:scale(1.15)}
.star-display{font-size:14px}
.cert-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.cert-icon{font-size:28px;flex-shrink:0}
.cert-body{flex:1;min-width:0}
.cert-name{font-weight:700;font-size:14px;margin-bottom:3px}
.cert-meta{font-size:12px;color:var(--muted)}

// ── AUTOCOMPLETE ENGINE ───────────────────────────────────────
/**
 * createAutocomplete(inputEl, items, opts)
 * items: [{id, label, sub}]  or  fn => returns Promise<items>
 * opts.onSelect(item)
 * opts.minChars (default 1)
 */
function createAutocomplete(inputEl, items, opts={}) {
  if(!inputEl) return;
  const wrap = inputEl.parentElement;
  if(!wrap.classList.contains('ac-wrap')) {
    const w = document.createElement('div');
    w.className = 'ac-wrap';
    inputEl.parentNode.insertBefore(w, inputEl);
    w.appendChild(inputEl);
  }
  const acWrap = inputEl.parentElement;
  let dd = acWrap.querySelector('.ac-dropdown');
  if(!dd){ dd = document.createElement('div'); dd.className='ac-dropdown'; acWrap.appendChild(dd); }
  let allItems = typeof items === 'function' ? [] : items;
  let selIdx = -1;
  const minChars = opts.minChars ?? 1;

  async function refresh(){
    if(typeof items === 'function') allItems = await items();
  }

  function show(filtered){
    selIdx = -1;
    if(!filtered.length){
      dd.innerHTML=`<div class="ac-no-results">No results found</div>`;
    } else {
      dd.innerHTML = filtered.map((it,i)=>
        `<div class="ac-item" data-idx="${i}" data-id="${it.id||''}" data-label="${(it.label||'').replace(/"/g,'&quot;')}">
          <span>${it.label||''}</span>
          ${it.sub?`<span class="ac-item-sub">${it.sub}</span>`:''}
        </div>`
      ).join('');
      dd.querySelectorAll('.ac-item').forEach(el=>{
        el.addEventListener('mousedown', e=>{
          e.preventDefault();
          const idx=parseInt(el.dataset.idx);
          selectItem(filtered[idx]);
        });
      });
    }
    dd.classList.add('open');
  }
  function hide(){ dd.classList.remove('open'); selIdx=-1; }
  function selectItem(it){
    inputEl.value = it.label||'';
    inputEl.dataset.selectedId = it.id||'';
    hide();
    if(opts.onSelect) opts.onSelect(it);
  }

  inputEl.addEventListener('focus', async()=>{
    await refresh();
    const v = inputEl.value.trim().toLowerCase();
    if(v.length >= minChars || minChars===0){
      const f = allItems.filter(it=>(it.label||'').toLowerCase().includes(v));
      show(f);
    }
  });

  inputEl.addEventListener('input', async()=>{
    await refresh();
    const v = inputEl.value.trim().toLowerCase();
    if(v.length < minChars){ hide(); return; }
    const f = allItems.filter(it=>(it.label||'').toLowerCase().includes(v)||(it.sub||'').toLowerCase().includes(v));
    show(f);
  });

  inputEl.addEventListener('keydown', e=>{
    const items2 = dd.querySelectorAll('.ac-item');
    if(!dd.classList.contains('open')) return;
    if(e.key==='ArrowDown'){ e.preventDefault(); selIdx=Math.min(selIdx+1,items2.length-1); items2.forEach((el,i)=>el.classList.toggle('selected',i===selIdx)); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); selIdx=Math.max(selIdx-1,0); items2.forEach((el,i)=>el.classList.toggle('selected',i===selIdx)); }
    else if(e.key==='Enter' && selIdx>=0){ e.preventDefault(); items2[selIdx].dispatchEvent(new Event('mousedown')); }
    else if(e.key==='Escape'){ hide(); }
  });

  document.addEventListener('click', e=>{ if(!acWrap.contains(e.target)) hide(); }, true);
  return { refresh, hide };
}

// Helper: attach AC to a plain text input that mirrors a hidden field
function attachClientAC(inputId, hiddenId, clientList, onSelectCb){
  const inp = document.getElementById(inputId);
  if(!inp) return;
  const items = clientList.map(c=>({id:c.id, label:c.name||'', sub:c.phone||''}));
  createAutocomplete(inp, items, {
    minChars:0,
    onSelect(it){
      const hid = document.getElementById(hiddenId);
      if(hid) hid.value = it.id;
      if(onSelectCb) onSelectCb(it);
    }
  });
}

function attachUserAC(inputId, hiddenId, userList, onSelectCb){
  const inp = document.getElementById(inputId);
  if(!inp) return;
  const items = userList.map(u=>({id:u.id, label:u.name||u.email||'', sub:u.role||''}));
  createAutocomplete(inp, items, {
    minChars:0,
    onSelect(it){
      const hid = document.getElementById(hiddenId);
      if(hid) hid.value = it.id;
      if(onSelectCb) onSelectCb(it);
    }
  });
}

function fmt12(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}
function fmtDate(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
function fmtFullTime(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true})}
function to12h(t){if(!t||!t.includes(':'))return t||'—';const[h,m]=t.split(':').map(Number);const ampm=h>=12?'PM':'AM';const h12=h%12||12;return`${h12}:${String(m).padStart(2,'0')} ${ampm}`}

const db=()=>window.FB.db;
const auth=()=>window.FB.auth;
const fn=()=>window.FN;

// ── FIRESTORE HELPERS ─────────────────────────────────────────
async function fsGet(path,id){try{const snap=await fn().getDoc(fn().doc(db(),path,id));return snap.exists()?{id:snap.id,...snap.data()}:null}catch(e){return null}}
async function fsGetAll(path,...constraints){
  try{
    const q=constraints.length?fn().query(fn().collection(db(),path),...constraints):fn().collection(db(),path);
    const snap=await fn().getDocs(q);const out=[];snap.forEach(d=>out.push({id:d.id,...d.data()}));return out;
  }catch(e){return[]}
}
async function fsAdd(path,data){return fn().addDoc(fn().collection(db(),path),{...data,createdAt:fn().serverTimestamp()})}
async function fsSet(path,id,data){return fn().setDoc(fn().doc(db(),path,id),{...data,updatedAt:fn().serverTimestamp()})}
async function fsUpdate(path,id,data){return fn().updateDoc(fn().doc(db(),path,id),{...data,updatedAt:fn().serverTimestamp()})}
async function fsDel(path,id){return fn().deleteDoc(fn().doc(db(),path,id))}

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin(){
  const email=$('l-email').value.trim(),pwd=$('l-pwd').value,role=$('l-role').value,btn=$('l-btn'),alertEl=$('la');
  alertEl.classList.remove('show');
  if(!email||!pwd||!role){alertEl.textContent='Please fill in all fields.';alertEl.classList.add('show');return}
  btn.innerHTML='<span class="spin"></span> Signing in…';btn.disabled=true;
  try{
    const cred=await fn().signInWithEmailAndPassword(auth(),email,pwd);
    const uid=cred.user.uid;
    const uDoc=await fsGet('users',uid);
    if(uDoc){
      if(uDoc.role!==role){await fn().signOut(auth());alertEl.textContent=`Wrong role. Your account role is "${uDoc.role}".`;alertEl.classList.add('show');btn.textContent='SIGN IN';btn.disabled=false;return}
      CU=uDoc;CR=uDoc.role;
    }else{
      const names={admin:'Admin',coordinatorhead:'Coordinator Head',coordinator:'Coordinator',trainer:'Trainer',client:'Client'};
      const profile={email,role,name:names[role]||role,active:true,createdAt:fn().serverTimestamp()};
      await fn().setDoc(fn().doc(db(),'users',uid),profile);
      CU={id:uid,...profile};CR=role;
    }
    startApp();
  }catch(e){
    const m=e.message||'';
    alertEl.textContent=m.includes('invalid-credential')||m.includes('wrong-password')?'Incorrect email or password.':m.includes('user-not-found')?'No account found.':m.includes('invalid-email')?'Invalid email.':m.includes('too-many-requests')?'Too many attempts.':m.replace('Firebase:','').replace(/\(auth.*\)/,'').trim();
    alertEl.classList.add('show');btn.textContent='SIGN IN';btn.disabled=false;
  }
}
async function doLogout(){
  if(_chatUnsub){_chatUnsub();_chatUnsub=null}
  await fn().signOut(auth());
  CU=null;CR=null;
  $('app').style.display='none';$('login-page').style.display='flex';
  $('l-email').value='';$('l-pwd').value='';$('l-role').value='';
  $('l-btn').textContent='SIGN IN';$('l-btn').disabled=false;
  toast('Signed out','info');
}

async function doChangePwd(){const cur=$('cp-cur').value,np=$('cp-new').value,cfm=$('cp-cfm').value;if(!cur||!np||!cfm){toast('Fill all fields','error');return}if(np.length<6){toast('Min 6 characters','error');return}if(np!==cfm){toast('Passwords do not match','error');return}try{const user=auth().currentUser;const cred=fn().EmailAuthProvider.credential(user.email,cur);await fn().reauthenticateWithCredential(user,cred);await fn().updatePassword(user,np);closeM1();toast('Password updated!','success')}catch(e){const m=e.message||'';toast(m.includes('wrong-password')||m.includes('invalid-credential')?'Current password incorrect.':m,'error')}}

              const myRatings=ratings.filter(r=>r.ratedById===u.id);

async function certificates(){

      </div>
      <button class="btn btn-p" onclick="openAddCert()">+ Add Certificate</button>
    </div>
    <div id="cert-list">
      ${certs.length===0?emptyState('🎓','No certificates yet','Add your fitness certifications to build credibility with clients.','+ Add Certificate','openAddCert()')
      :certs.map(c=>renderCertCard(c)).join('')}
    </div>`;
}
function renderCertCard(c){
  const icons={ACSM:'🏅',NASM:'🥇',ACE:'🎖',ISSA:'🏆',NSCA:'🥊',CPT:'📜',Nutrition:'🥗',Yoga:'🧘',CrossFit:'⚡',default:'🎓'};
  const icon=Object.keys(icons).find(k=>c.name&&c.name.toUpperCase().includes(k.toUpperCase()))?icons[Object.keys(icons).find(k=>c.name&&c.name.toUpperCase().includes(k.toUpperCase()))]:icons.default;
  return`<div class="cert-card">
    <div class="cert-icon">${icon}</div>
    <div class="cert-body">
      <div class="cert-name">${c.name||'—'}</div>
      <div class="cert-meta">🏛 ${c.issuer||'—'} ${c.issueYear?`• ${c.issueYear}`:''}${c.expiryYear?` – ${c.expiryYear}`:''}</div>
      ${c.credentialId?`<div class="cert-meta" style="margin-top:3px">🔑 ID: ${c.credentialId}</div>`:''}
      ${c.description?`<div style="font-size:12px;color:var(--muted);margin-top:6px">${c.description}</div>`:''}
      ${c.url?`<a href="${c.url}" target="_blank" style="color:var(--accent);font-size:12px;margin-top:6px;display:inline-block">🔗 View Certificate</a>`:''}
      <div class="cert-meta" style="margin-top:6px">Added: ${fmtDate(c.createdAt)}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
      <button class="btn btn-g btn-sm" onclick="openEditCert('${c.id}')">Edit</button>
      <button class="btn btn-d btn-sm" onclick="delCert('${c.id}')">Delete</button>
    </div>
  </div>`;
}
function openAddCert(){openM1('ADD CERTIFICATE',certForm())}
async function openEditCert(id){const c=await fsGet('certificates',id);if(!c){toast('Not found','error');return}openM1('EDIT CERTIFICATE',certForm(c))}
function certForm(c={}){
  return`
    <div class="fg"><label class="fl">Certificate Name *</label><input class="fi" id="cf2-name" value="${c.name||''}" placeholder="e.g. Certified Personal Trainer (CPT)"></div>
    <div class="fg"><label class="fl">Issuing Organization *</label><input class="fi" id="cf2-issuer" value="${c.issuer||''}" placeholder="e.g. NASM, ACE, ISSA, ACSM"></div>
    <div class="fr">
      <div class="fg"><label class="fl">Issue Year</label><input class="fi" id="cf2-year" type="number" value="${c.issueYear||''}" placeholder="e.g. 2021" min="1990" max="2099"></div>
      <div class="fg"><label class="fl">Expiry Year</label><input class="fi" id="cf2-expiry" type="number" value="${c.expiryYear||''}" placeholder="e.g. 2024" min="1990" max="2099"></div>
    </div>
    <div class="fg"><label class="fl">Credential ID</label><input class="fi" id="cf2-cid" value="${c.credentialId||''}" placeholder="Optional credential/license ID"></div>
    <div class="fg"><label class="fl">Certificate URL</label><input class="fi" id="cf2-url" type="url" value="${c.url||''}" placeholder="https://…"></div>
    <div class="fg"><label class="fl">Description</label><textarea class="fta" id="cf2-desc" placeholder="Brief description…">${c.description||''}</textarea></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM1()">Cancel</button><button class="btn btn-p" onclick="saveCert('${c.id||''}')">Save</button></div>`;
}
async function saveCert(existingId=''){
  const name=$('cf2-name').value.trim(),issuer=$('cf2-issuer').value.trim();
  if(!name||!issuer){toast('Name and issuer required','error');return}
  const myUid=auth().currentUser.uid;
  const data={name,issuer,issueYear:Number($('cf2-year').value)||null,expiryYear:Number($('cf2-expiry').value)||null,credentialId:$('cf2-cid').value.trim(),url:$('cf2-url').value.trim(),description:$('cf2-desc').value.trim(),trainerId:myUid,trainerName:CU.name||''};
  try{
    if(existingId){await fsUpdate('certificates',existingId,data);toast('Certificate updated!','success')}
    else{await fsAdd('certificates',data);toast('Certificate added!','success')}
    closeM1();certificates();
  }catch(e){toast('Error: '+e.message,'error')}
}
async function delCert(id){if(!confirm('Delete this certificate?'))return;try{await fsDel('certificates',id);toast('Deleted','success');certificates()}catch(e){toast('Error: '+e.message,'error')}}

              <div style="font-size:12px;color:var(--muted)">${t.gender||''} Trainer</div>
            </div>

        <tbody>${[...ratings].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).slice(0,30).map(r=>{

            <td style="font-size:12px">${r.sessionDate||fmtDate(r.createdAt)}</td>
            <td><strong>${r.trainerName||'—'}</strong></td>
            <td style="font-size:12px">${r.sessionType||'—'}</td>
            <td><span style="color:${col};font-size:16px;font-weight:700">${stars}</span> <span style="font-family:'JetBrains Mono';font-size:12px">${r.rating}/5</span></td>

// ── EDIT RATING ───────────────────────────────────────────────
async function openEditRating(ratingId){
  const r=await fsGet('trainerratings',ratingId);
  if(!r){toast('Rating not found','error');return}
  const trainers=await fsGetAll('users',fn().where('role','==','trainer'));
  openM1('EDIT RATING',`
    <div class="fg"><label class="fl">Trainer</label>
      <select class="fs" id="er-trainer">
        <option value="">— Select —</option>
        ${trainers.map(t=>`<option value="${t.id}" ${t.id===r.trainerId?'selected':''}>${t.name||t.email}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><label class="fl">Session Type</label>
      <select class="fs" id="er-type">${SESSION_TYPES.map(t=>`<option ${r.sessionType===t?'selected':''}>${t}</option>`).join('')}</select>
    </div>
    <div class="fg"><label class="fl">Session Date</label>
      <input class="fi" id="er-date" type="date" value="${r.sessionDate||''}">
    </div>
    <div class="fg">
      <label class="fl">Rating *</label>
      <div style="margin-bottom:8px">
        <div class="stars" id="er-stars">
          ${[1,2,3,4,5].map(n=>`<span class="star" onclick="setEditRating(${n})" onmouseover="hoverEditRating(${n})" onmouseout="unhoverEditRating()" data-val="${n}" style="color:${n<=(r.rating||0)?'#ffbb00':'var(--muted)'}">${n<=(r.rating||0)?'★':'☆'}</span>`).join('')}
        </div>
        <div id="er-rating-lbl" style="font-size:12px;color:var(--muted);margin-top:5px">${['','😞 Poor','😐 Fair','🙂 Good','😊 Great','🌟 Excellent'][r.rating||0]||''}</div>
      </div>
      <input type="hidden" id="er-rating" value="${r.rating||0}">
    </div>
    <div class="fg"><label class="fl">Comment</label>
      <textarea class="fta" id="er-comment">${r.comment||''}</textarea>
    </div>
    <div class="mo-foot">
      <button class="btn btn-g" onclick="closeM1()">Cancel</button>
      <button class="btn btn-p" onclick="saveEditRating('${ratingId}')">Update Rating</button>
    </div>`);
  window._erSelectedRating=r.rating||0;
}
function setEditRating(n){
  $('er-rating').value=n;window._erSelectedRating=n;
  updateEditStarDisplay(n);
  const labels=['','😞 Poor','😐 Fair','🙂 Good','😊 Great','🌟 Excellent'];
  $('er-rating-lbl').textContent=labels[n]||'';
}
function hoverEditRating(n){updateEditStarDisplay(n,true)}
function unhoverEditRating(){updateEditStarDisplay(window._erSelectedRating||0)}
function updateEditStarDisplay(n,hover=false){
  const stars=$('er-stars');if(!stars)return;
  stars.querySelectorAll('.star').forEach((s,i)=>{
    s.textContent=i<n?'★':'☆';
    s.style.color=i<n?(hover?'#ffdd44':'#ffbb00'):'var(--muted)';
  });
}
async function saveEditRating(ratingId){
  const trainerId=$('er-trainer').value;
  const rating=Number($('er-rating').value||0);
  if(!trainerId||!rating){toast('Select trainer and rating','error');return}
  const trainerSel=$('er-trainer');
  const trainerName=trainerId?trainerSel.options[trainerSel.selectedIndex].text:'';
  try{
    await fsUpdate('trainerratings',ratingId,{
      trainerId,trainerName,
      rating,comment:$('er-comment').value.trim(),
      sessionType:$('er-type').value,sessionDate:$('er-date').value
    });
    closeM1();toast('Rating updated!','success');trainerratings();
  }catch(e){toast('Error: '+e.message,'error')}
}
async function delRating(id){
  if(!confirm('Delete this rating?'))return;
  try{await fsDel('trainerratings',id);toast('Rating deleted','success');trainerratings()}catch(e){toast('Error','error')}
}

async function openRateTrainer(preTrainerId='',preTrainerName=''){
  const[trainers,sessions]=await Promise.all([
    fsGetAll('users',fn().where('role','==','trainer')),
    fsGetAll('sessions',fn().where('status','==','completed'))
  ]);
  let selectedRating=0;
  const trainerOpts=trainers.map(t=>`<option value="${t.id}" ${t.id===preTrainerId?'selected':''}>${t.name||t.email}</option>`).join('');
  openM1('RATE TRAINER SESSION',`
    <div class="fg"><label class="fl">Trainer *</label>
      <select class="fs" id="rt-trainer" onchange="updateRatingSessionList()">
        <option value="">— Select trainer —</option>${trainerOpts}
      </select>
    </div>
    <div class="fg"><label class="fl">Session (optional)</label>
      <select class="fs" id="rt-session"><option value="">— Select completed session —</option></select>
    </div>
    <div class="fg"><label class="fl">Session Type</label>
      <select class="fs" id="rt-type"><option value="">— Select —</option>${SESSION_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
    </div>
    <div class="fg"><label class="fl">Session Date</label>
      <input class="fi" id="rt-date" type="date" value="${new Date().toISOString().split('T')[0]}">
    </div>
    <div class="fg">
      <label class="fl">Rating *</label>
      <div style="margin-bottom:8px">
        <div class="stars" id="rt-stars">
          ${[1,2,3,4,5].map(n=>`<span class="star" onclick="setRating(${n})" onmouseover="hoverRating(${n})" onmouseout="unhoverRating()" data-val="${n}">☆</span>`).join('')}
        </div>
        <div id="rt-rating-lbl" style="font-size:12px;color:var(--muted);margin-top:5px">Click to rate</div>
      </div>
      <input type="hidden" id="rt-rating" value="0">
    </div>
    <div class="fg"><label class="fl">Comment</label>
      <textarea class="fta" id="rt-comment" placeholder="Notes on performance…"></textarea>
    </div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM1()">Cancel</button><button class="btn btn-p" onclick="saveTrainerRating()">Submit Rating</button></div>`);

  if(preTrainerId){$('rt-trainer').value=preTrainerId;updateRatingSessionList()}
}
function updateRatingSessionList(){
  const tid=$('rt-trainer').value;
  const sel=$('rt-session');if(!sel)return;
  const filtered=(window._rtSessions||[]).filter(s=>s.trainerId===tid);
  sel.innerHTML=`<option value="">— Select completed session —</option>`+filtered.slice(0,50).map(s=>`<option value="${s.id}" data-date="${s.date||''}" data-type="${s.type||''}">${s.clientName||'—'} • ${s.date||'—'} ${to12h(s.time)} (${s.type||'—'})</option>`).join('');
  sel.onchange=()=>{const opt=sel.options[sel.selectedIndex];if(opt&&opt.dataset.date){$('rt-date').value=opt.dataset.date}if(opt&&opt.dataset.type&&$('rt-type')){$('rt-type').value=opt.dataset.type}};
}
function setRating(n){$('rt-rating').value=n;window._selectedRating=n;updateStarDisplay(n);const labels=['','😞 Poor','😐 Fair','🙂 Good','😊 Great','🌟 Excellent'];$('rt-rating-lbl').textContent=labels[n]||''}
function hoverRating(n){updateStarDisplay(n,true)}
function unhoverRating(){updateStarDisplay(window._selectedRating||0)}
function updateStarDisplay(n,hover=false){const stars=$('rt-stars');if(!stars)return;stars.querySelectorAll('.star').forEach((s,i)=>{s.textContent=i<n?'★':'☆';s.style.color=i<n?(hover?'#ffdd44':'#ffbb00'):'var(--muted)'})}
async function saveTrainerRating(){
  const trainerId=$('rt-trainer').value;const rating=Number($('rt-rating').value||0);
  const trainerSel=$('rt-trainer');const trainerName=trainerId?trainerSel.options[trainerSel.selectedIndex].text:'';
  if(!trainerId||!rating){toast('Select trainer and rating','error');return}
  const sessionSel=$('rt-session');const sessionId=sessionSel?sessionSel.value:'';
  try{
    await fsAdd('trainerratings',{trainerId,trainerName,rating,comment:$('rt-comment').value.trim(),sessionId,sessionType:$('rt-type').value,sessionDate:$('rt-date').value,ratedById:auth().currentUser.uid,ratedByName:CU.name||'',ratedByRole:CR});
    closeM1();toast('Rating submitted!','success');trainerratings();
  }catch(e){toast('Error: '+e.message,'error')}
}

  openM2(`TRAINER: ${trainerName.toUpperCase()}`,`
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px">
      <div style="text-align:center">
        <div style="font-size:42px;font-weight:900;color:${col}">${avg.toFixed(1)}</div>

      </div>
      <div style="flex:1">
        ${[5,4,3,2,1].map(n=>{const cnt=ratings.filter(r=>r.rating===n).length;const pct=ratings.length?Math.round(cnt/ratings.length*100):0;return`<div class="pb-wrap"><div class="pb-lbl"><span>${'★'.repeat(n)}</span><span>${cnt}</span></div><div class="pb"><div class="pb-fill" style="width:${pct}%;background:${['','#ff4444','#ffbb00','#ffbb00','#00e676','#d4ff00'][n]}"></div></div></div>`}).join('')}
      </div>
    </div>
    ${certs.length>0?`<div class="detail-section"><div class="detail-section-title">🎓 Certificates (${certs.length})</div><div style="display:flex;flex-wrap:wrap;gap:8px">${certs.map(c=>`<span class="badge b-a" style="font-size:12px">🎓 ${c.name} <span style="opacity:.6">(${c.issuer})</span></span>`).join('')}</div></div>`:''}
    ${ratings.length===0?emptyState('⭐','No ratings yet','','','')
    :`<div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Rating</th><th>Session</th><th>Comment</th><th>By</th><th>Actions</th></tr></thead>
      <tbody>${ratings.map(r=>{const rc=['#888','#ff4444','#ffbb00','#ffbb00','#00e676','#d4ff00'][r.rating||0]||'#888';return`<tr>
        <td style="font-size:12px">${r.sessionDate||'—'}</td>
        <td><span style="color:${rc};font-size:16px">${'★'.repeat(r.rating||0)}${'☆'.repeat(5-(r.rating||0))}</span> <span style="font-size:11px">${r.rating}/5</span></td>
        <td style="font-size:12px">${r.sessionType||'—'}</td>
        <td style="font-size:12px">${r.comment||'—'}</td>
        <td style="font-size:12px">${r.ratedByName||'—'}</td>
        <td><button class="btn btn-g btn-sm" onclick="closeM2();openEditRating('${r.id}')">✏️ Edit</button></td>
      </tr>`}).join('')}</tbody></table></div>`}
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM2()">Close</button></div>`);
}

  let q=[];
  if(CR==='trainer')q=[fn().where('trainerId','==',auth().currentUser.uid)];
  const data=await fsGetAll('clients',...q);
  $('page').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap">
      <input class="fi" id="cl-search" placeholder="🔍 Search by name or phone…" oninput="filterClients()" style="max-width:280px;margin:0">

    <tbody>${data.map(c=>`<tr>
      <td><strong>${c.name||'—'}</strong></td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${c.phone||'—'}</td>
      <td style="font-size:12px">${c.age||'—'}</td>
      <td style="font-size:12px">${c.country||'—'}</td>
      <td>${planBadge(c.plan)}</td>
      <td style="font-size:12px">${c.trainerName||'—'}</td>
      <td style="font-size:12px">${c.coordinatorName?`<span class="badge b-b">🧑‍💼 ${c.coordinatorName}</span>`:'<span style="color:var(--muted2)">—</span>'}</td>
      <td style="font-size:12px">${c.goal||'—'}</td>
      <td>${c.active?`<span class="badge b-g">Active</span>`:`<span class="badge b-r">Inactive</span>`}</td>
      <td><div class="td-actions">
        <button class="btn btn-g btn-sm" onclick="viewClient('${c.id}')">View</button>
        ${CR!=='trainer'&&CR!=='client'?`<button class="btn btn-g btn-sm" onclick="openEditClient('${c.id}')">Edit</button><button class="btn btn-d btn-sm" onclick="delClient('${c.id}')">Delete</button>`:''}
      </div></td>
    </tr>`).join('')}</tbody></table>`;
}
function filterClients(){const v=$('cl-search').value.toLowerCase();const filtered=(window._clientsData||[]).filter(c=>(c.name||'').toLowerCase().includes(v)||(c.phone||'').includes(v));$('cl-table').innerHTML=renderClientsTable(filtered)}
async function openAddClient(){const html=await clientForm();openM2('ADD CLIENT',html);initClientFormAC()}

function openAddUser(){

    <div id="uf-err" class="alert alert-err"></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM1()">Cancel</button><button class="btn btn-p" onclick="createUser()">Create User</button></div>`);

async function createUser(){
  const name=$('uf-name').value.trim(),role=$('uf-role').value,email=$('uf-email').value.trim(),pwd=$('uf-pwd').value,errEl=$('uf-err');
  errEl.classList.remove('show');
  if(!name||!role||!email||!pwd){errEl.textContent='All fields are required.';errEl.classList.add('show');return}
  if(pwd.length<6){errEl.textContent='Password must be at least 6 characters.';errEl.classList.add('show');return}
  try{
    const cred=await fn().createUserWithEmailAndPassword(window.FB.auth2,email,pwd);
    const newUid=cred.user.uid;
    await fn().signOut(window.FB.auth2);
    await fn().setDoc(fn().doc(db(),'users',newUid),{name,email,role,gender:$('uf-gender').value,phone:$('uf-phone').value.trim(),active:true,createdAt:fn().serverTimestamp()});
    closeM1();toast(`User "${name}" created!`,'success');users();
  }catch(e){errEl.textContent=e.message.includes('email-already-in-use')?'This email is already registered.':e.message.replace('Firebase:','').replace(/\(auth.*\)/,'').trim();errEl.classList.add('show')}
}

    <div class="fr">

    <div class="fg"><label class="fl">Status</label><select class="fs" id="ue-active"><option value="true" ${u.active!==false?'selected':''}>Active</option><option value="false" ${u.active===false?'selected':''}>Inactive</option></select></div>

async function saveEditUser(id){
  const name=$('ue-name').value.trim(),role=$('ue-role').value;

async function sessions(){
  $('page').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;
  async function loadSTab(tab){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    const tabEl=document.querySelector(`.tab[data-stab="${tab}"]`);if(tabEl)tabEl.classList.add('active');
    $('sess-list').innerHTML=`<div style="padding:30px;text-align:center;color:var(--muted)"><div class="spin" style="width:22px;height:22px;margin:0 auto"></div></div>`;
    let q=[];
    if(CR==='trainer')q=[fn().where('trainerId','==',auth().currentUser.uid)];
    if(CR==='client')q=[fn().where('clientId','==',auth().currentUser.uid)];
    let data=await fsGetAll('sessions',...q);
    const today=new Date();today.setHours(0,0,0,0);
    if(tab==='today')data=data.filter(s=>{const d=s.date?new Date(s.date):null;if(!d)return false;d.setHours(0,0,0,0);return d.getTime()===today.getTime()});
    else if(tab==='upcoming')data=data.filter(s=>{const d=s.date?new Date(s.date):null;if(!d)return false;d.setHours(0,0,0,0);return d.getTime()>today.getTime()});
    else if(tab==='past')data=data.filter(s=>{const d=s.date?new Date(s.date):null;if(!d)return false;d.setHours(0,0,0,0);return d.getTime()<today.getTime()});
    data.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||'').localeCompare(b.time||''));
    $('sess-list').innerHTML=renderSessionsTable(data,tab);
  }
  $('page').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div class="tabs" style="margin:0;border:none">${['today','upcoming','past','all'].map(t=>`<div class="tab ${t==='today'?'active':''}" data-stab="${t}" onclick="window._sTab('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('')}</div>
      ${CR!=='client'?`<button class="btn btn-p" onclick="openAddSession()">+ Schedule Session</button>`:''}
    </div>
    <div class="card" style="padding:0"><div class="tbl-wrap" id="sess-list"></div></div>`;
  window._sTab=loadSTab;loadSTab('today');
}
function renderSessionsTable(data,tab){
  if(!data.length){const msgs={today:'No sessions today.',upcoming:'No upcoming sessions.',past:'No past sessions.',all:'No sessions found.'};return emptyState('📅',msgs[tab]||'No sessions',CR!=='client'?'Use the Schedule button to add sessions.':'Your coordinator will schedule sessions.',CR!=='client'&&tab!=='past'?'+ Schedule':'',CR!=='client'&&tab!=='past'?'openAddSession()':'')}
  return`<table><thead><tr><th>Date</th><th>Time</th><th>Client</th><th>Trainer</th><th>Type</th><th>Status</th><th>Meet Link</th><th>Actions</th></tr></thead>

function roleColorForChat(role){const map={admin:'var(--purple)',coordinatorhead:'var(--orange)',coordinator:'var(--blue)',trainer:'var(--green)',client:'var(--yellow)'};return{bg:(map[role]||'var(--muted)').replace(')',',0.15)').replace('var','rgba').replace('(--','('),fg:map[role]||'var(--muted)'}}

function filterChatContacts(){const v=($('chat-search-inp').value||'').toLowerCase();const filtered=(window._chatContacts||[]).filter(c=>(c.name||'').toLowerCase().includes(v)||(c.email||'').toLowerCase().includes(v));renderChatContacts(filtered)}
function getChatId(uid1,uid2){return[uid1,uid2].sort().join('_')}
async function openChatWith(contactId,contactName,contactRole,rawRole){
  document.querySelectorAll('.chat-item').forEach(i=>i.classList.remove('active'));
  const ci=$(`ci-${contactId}`);if(ci)ci.classList.add('active');
  const myUid=window._chatMyUid||auth().currentUser.uid;
  const chatId=getChatId(myUid,contactId);
  window._activeChatId=chatId;window._activeChatContactId=contactId;
  const rc=roleColorForChat(rawRole);
  $('chat-main').innerHTML=`
    <div class="chat-header">
      <div style="width:36px;height:36px;border-radius:50%;background:${rc.bg};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:${rc.fg}">${(contactName||'?')[0].toUpperCase()}</div>
      <div><div style="font-weight:600;font-size:14px">${contactName}</div><div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${rc.fg}">${contactRole}</div></div>
    </div>

    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-inp" placeholder="Type a message… (Enter to send)" rows="1" onkeydown="chatEnterSend(event,'${chatId}','${myUid}','${contactId}')"></textarea>
      <button class="btn btn-p" onclick="sendChatMsg('${chatId}','${myUid}','${contactId}')">Send</button>
    </div>`;
  if(_chatUnsub){_chatUnsub();_chatUnsub=null}
  try{
    const msgsRef=fn().collection(db(),`chats/${chatId}/messages`);
    const q=fn().query(msgsRef,fn().orderBy('timestamp','asc'));
    _chatUnsub=fn().onSnapshot(q,snapshot=>{
      const msgs=$('chat-msgs');if(!msgs)return;
      msgs.innerHTML='';
      if(snapshot.empty){msgs.innerHTML=`<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">Start the conversation! 👋</div>`;return}
      snapshot.forEach(doc=>{const m={id:doc.id,...doc.data()};const isMe=m.senderId===myUid;const ts=m.timestamp?fmtFullTime(m.timestamp):'';const div=document.createElement('div');div.className=`msg ${isMe?'msg-out':'msg-in'}`;div.innerHTML=`${m.message}<div class="msg-meta">${ts}${isMe?` · ${m.read?'✓✓':'✓'}`:''}</div>`;msgs.appendChild(div)});
      msgs.scrollTop=msgs.scrollHeight;markMsgsRead(chatId,myUid);

async function markMsgsRead(chatId,myUid){try{const msgsRef=fn().collection(db(),`chats/${chatId}/messages`);const q=fn().query(msgsRef,fn().where('senderId','!=',myUid),fn().where('read','==',false));const snap=await fn().getDocs(q);const updates=[];snap.forEach(doc=>updates.push(fn().updateDoc(doc.ref,{read:true})));await Promise.all(updates)}catch(e){}}

      :`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">${chats.map(c=>{const parts=(c.participants||[]).map(uid=>getUserName(uid)).join(' ↔ ');return`<div class="card" style="cursor:pointer" onclick="adminViewChat('${c.id}')" onmouseover="this.style.borderColor='var(--purple)'" onmouseout="this.style.borderColor='var(--border)'"><div style="font-weight:600;font-size:13px;margin-bottom:6px">${parts}</div><div style="font-size:12px;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${c.lastMessage||'No messages'}</div><div style="font-size:10px;color:var(--muted2);margin-top:5px">${c.lastMessageTime?fmtFullTime(c.lastMessageTime):''}</div></div>`;}).join('')}</div>`}
    </div>`;
  window._monitorChats=chats;window._monitorUsers=users;
}
function filterMonitorChats(){if(!window._monitorChats)return;const v=($('cm-search').value||'').toLowerCase();function getUserName(uid){const u=(window._monitorUsers||[]).find(x=>x.id===uid);return u?u.name||u.email:uid}const filtered=window._monitorChats.filter(c=>{const parts=(c.participants||[]).map(getUserName).join(' ').toLowerCase();return parts.includes(v)||(c.lastMessage||'').toLowerCase().includes(v)});const container=$('chat-monitor-list');if(!container)return;container.innerHTML=filtered.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">${filtered.map(c=>{const parts=(c.participants||[]).map(getUserName).join(' ↔ ');return`<div class="card" style="cursor:pointer" onclick="adminViewChat('${c.id}')"><div style="font-weight:600;font-size:13px;margin-bottom:6px">${parts}</div><div style="font-size:12px;color:var(--muted)">${c.lastMessage||'No messages'}</div></div>`;}).join('')}</div>`:emptyState('🔍','No results','','','');}
async function adminViewChat(chatId){
  const users=window._monitorUsers||await fsGetAll('users');
  function getUserName(uid){const u=users.find(x=>x.id===uid);return u?`${u.name||u.email} (${u.role})`:uid}
  openM3('CHAT MONITOR',`
    <div style="background:var(--purple-dim);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--purple)">👁 Admin read-only view</div>
    <div id="admin-chat-msgs" style="background:var(--bg);border-radius:10px;padding:14px;min-height:300px;max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:8px">
      <div style="text-align:center;color:var(--muted)"><div class="spin" style="width:20px;height:20px;margin:0 auto"></div></div>
    </div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM3()">Close</button></div>`);
  try{
    const msgsRef=fn().collection(db(),`chats/${chatId}/messages`);const q=fn().query(msgsRef,fn().orderBy('timestamp','asc'));const snap=await fn().getDocs(q);
    const container=$('admin-chat-msgs');if(!container)return;container.innerHTML='';
    if(snap.empty){container.innerHTML=`<div style="text-align:center;color:var(--muted);font-size:13px">No messages.</div>`;return}
    snap.forEach(doc=>{const m={id:doc.id,...doc.data()};const ts=m.timestamp?fmtFullTime(m.timestamp):'';const div=document.createElement('div');div.style.cssText='padding:10px 14px;border-radius:10px;background:var(--surface);border:1px solid var(--border);font-size:13px';div.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:4px"><strong style="color:var(--accent)">${getUserName(m.senderId)}</strong><span style="font-size:10px;color:var(--muted)">${ts}</span></div>${m.message}`;container.appendChild(div)});
    container.scrollTop=container.scrollHeight;
  }catch(e){const c=$('admin-chat-msgs');if(c)c.innerHTML=`<div style="color:var(--red);font-size:13px">⚠️ ${e.message}</div>`}
}

// ── TIME SLOTS ────────────────────────────────────────────────
async function slots(){
  $('page').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;
  const isAdmin=(CR==='admin'||CR==='coordinator'||CR==='coordinatorhead');
  const slotDocs=await fsGetAll('slots');
  const fixedSlots=[{id:'s1',time:'6:00 – 7:00 AM',period:'Morning',trainerGenderHint:''},{id:'s2',time:'7:00 – 8:00 AM',period:'Morning',trainerGenderHint:'Female'},{id:'s3',time:'8:00 – 9:00 AM',period:'Morning',trainerGenderHint:''},{id:'s4',time:'9:00 – 10:00 AM',period:'Morning',trainerGenderHint:'Female'},{id:'s5',time:'4:30 – 5:30 PM',period:'Evening',trainerGenderHint:'Female'},{id:'s6',time:'5:30 – 6:30 PM',period:'Evening',trainerGenderHint:''},{id:'s7',time:'6:30 – 7:30 PM',period:'Evening',trainerGenderHint:'Female'},{id:'s8',time:'7:30 – 8:30 PM',period:'Evening',trainerGenderHint:''}];
  function renderSlotSection(title,slotList){
    return`<div class="card"><div class="card-hd"><div class="card-title">${title}</div></div>
      <div class="slot-grid">${slotList.map(s=>{const doc=slotDocs.find(d=>d.slotId===s.id)||{};const cap=Number(doc.maxCapacity)||10;const enrolledCount=Number(doc.enrolledCount)||0;const isFull=enrolledCount>=cap;return`<div class="slot-card ${isFull?'full':''}"><div class="slot-time">${s.time}</div><div class="slot-trainer">👤 ${doc.trainerName||'TBD'} ${doc.trainerGender?`(${doc.trainerGender})`:''}</div>${s.trainerGenderHint?`<div class="slot-tag slot-tag-f">♀ ${s.trainerGenderHint}</div>`:''}<div class="slot-cap" style="color:${isFull?'var(--red)':'var(--muted)'}">${enrolledCount}/${cap} ${isFull?'<span class="badge b-r">Full</span>':'<span class="badge b-g">Open</span>'}</div>${isAdmin?`<div style="margin-top:10px"><button class="btn btn-g btn-sm btn-w" onclick="manageSlot('${s.id}','${s.time}')">⚙ Manage</button></div>`:''}${CR==='client'?`<div style="margin-top:10px">${isFull?`<button class="btn btn-g btn-sm btn-w" disabled>Full</button>`:`<button class="btn btn-p btn-sm btn-w" onclick="enrollSlotClient('${s.id}','${s.time}')">Book</button>`}</div>`:''}</div>`;}).join('')}
      </div></div>`;
  }
  $('page').innerHTML=`
    <div class="card" style="background:var(--accent-dim);border-color:rgba(212,255,0,.3);margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:28px">🕐</span>
        <div><div style="font-weight:700;color:var(--accent)">Fixed Daily Schedule — Silver & Gold Plans</div><div style="font-size:12px;color:var(--muted)">${isAdmin?'Manage slots below to assign trainers.':'Choose your preferred time slot.'}</div></div>
        ${isAdmin?`<button class="btn btn-p btn-sm" style="margin-left:auto" onclick="setupDefaultSlots()">Setup Defaults</button>`:''}
      </div>
    </div>
    ${renderSlotSection('🌅 Morning Slots',fixedSlots.filter(s=>s.period==='Morning'))}
    ${renderSlotSection('🌇 Evening Slots',fixedSlots.filter(s=>s.period==='Evening'))}`;
}
async function enrollSlotClient(slotId,slotTime){
  const myUid=auth().currentUser.uid;
  try{
    const slotRef=fn().doc(db(),'slots',slotId);const slotSnap=await fn().getDoc(slotRef);
    if(slotSnap.exists()){const d=slotSnap.data();const enrolled=d.enrolledClients||[];const cap=Number(d.maxCapacity)||10;if(enrolled.includes(myUid)){toast('Already enrolled','info');return}if(enrolled.length>=cap){toast('Slot is full','error');return}await fn().updateDoc(slotRef,{enrolledClients:[...enrolled,myUid],enrolledCount:enrolled.length+1})}
    else{await fn().setDoc(slotRef,{slotId,slotTime,enrolledClients:[myUid],enrolledCount:1,maxCapacity:10,trainerId:'',trainerName:'',trainerGender:''})}
    toast('Slot booked! ✅','success');slots();
  }catch(e){toast('Error: '+e.message,'error')}
}
async function manageSlot(slotId,slotTime){
  const trainers=await fsGetAll('users',fn().where('role','==','trainer'));
  let slotDoc={};try{const snap=await fn().getDoc(fn().doc(db(),'slots',slotId));if(snap.exists())slotDoc=snap.data()}catch(e){}
  openM1(`MANAGE SLOT: ${slotTime}`,`
    <div class="fg"><label class="fl">Assign Trainer *</label><select class="fs" id="ms-trainer"><option value="">— Select trainer —</option>${trainers.map(t=>`<option value="${t.id}" data-gender="${t.gender||''}" ${slotDoc.trainerId===t.id?'selected':''}>${t.name||t.email} (${t.gender||'Any'})</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Max Capacity</label><input class="fi" id="ms-cap" type="number" value="${slotDoc.maxCapacity||10}" min="1" max="30"></div>
    <div style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:14px;font-size:12px;color:var(--muted)">Currently enrolled: <strong>${slotDoc.enrolledCount||0}</strong></div>
    <div id="ms-err" class="alert alert-err"></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM1()">Cancel</button><button class="btn btn-p" onclick="saveSlotConfig('${slotId}','${slotTime}')">Save Slot</button></div>`);
}
async function saveSlotConfig(slotId,slotTime){
  const trainerSel=$('ms-trainer');if(!trainerSel){toast('Form error','error');return}
  const trainerId=trainerSel.value;const selectedOpt=trainerSel.options[trainerSel.selectedIndex];
  const trainerName=trainerId?selectedOpt.text.replace(/\s*\([^)]*\)\s*$/,'').trim():'';
  const trainerGender=trainerId?selectedOpt.dataset.gender||'':'';const cap=Number($('ms-cap').value)||10;
  try{
    const slotRef=fn().doc(db(),'slots',slotId);const snap=await fn().getDoc(slotRef);
    if(snap.exists()){await fn().updateDoc(slotRef,{trainerId,trainerName,trainerGender,maxCapacity:cap,slotTime,updatedAt:fn().serverTimestamp()})}
    else{await fn().setDoc(slotRef,{slotId,trainerId,trainerName,trainerGender,maxCapacity:cap,slotTime,enrolledClients:[],enrolledCount:0,createdAt:fn().serverTimestamp()})}
    closeM1();toast('Slot saved!','success');slots();
  }catch(e){const errEl=$('ms-err');if(errEl){errEl.textContent='Error: '+e.message;errEl.classList.add('show')}}
}
async function setupDefaultSlots(){
  const slotIds=['s1','s2','s3','s4','s5','s6','s7','s8'];
  const times=['6:00 – 7:00 AM','7:00 – 8:00 AM','8:00 – 9:00 AM','9:00 – 10:00 AM','4:30 – 5:30 PM','5:30 – 6:30 PM','6:30 – 7:30 PM','7:30 – 8:30 PM'];
  try{for(let i=0;i<slotIds.length;i++){const ref=fn().doc(db(),'slots',slotIds[i]);const snap=await fn().getDoc(ref);if(!snap.exists())await fn().setDoc(ref,{slotId:slotIds[i],slotTime:times[i],maxCapacity:10,enrolledClients:[],enrolledCount:0,trainerId:'',trainerName:'',trainerGender:'',createdAt:fn().serverTimestamp()})}toast('Default slots created!','success');slots()}catch(e){toast('Error: '+e.message,'error')}
}

// ── BATCHES ───────────────────────────────────────────────────
async function batches(){
  $('page').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;
  const isAdmin=(CR==='admin'||CR==='coordinator'||CR==='coordinatorhead');
  let q=[];if(CR==='trainer')q=[fn().where('trainerId','==',auth().currentUser.uid)];
  const[batchData,trainers,clients]=await Promise.all([fsGetAll('batches',...q),fsGetAll('users',fn().where('role','==','trainer')),fsGetAll('clients',fn().where('active','==',true))]);
  const corpClients=clients.filter(c=>c.plan==='Corporate Fitness'||c.plan==='Platinum'||c.plan==='Platinum Plus');
  $('page').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:13px;color:var(--muted)">Corporate & Premium Group Training Programs</div>
        <div class="stats-grid" style="margin:10px 0 0;gap:10px">
          <div class="sc sc-p" style="padding:12px;margin:0"><div class="sc-lbl">Eligible</div><div class="sc-val" style="font-size:24px">${corpClients.length}</div></div>
          <div class="sc sc-b" style="padding:12px;margin:0"><div class="sc-lbl">Programs</div><div class="sc-val" style="font-size:24px">${batchData.length}</div></div>
        </div>
      </div>
      ${isAdmin?`<button class="btn btn-p" onclick="openCreateBatch()">+ Create Program</button>`:''}
    </div>
    <div id="batch-list">
      ${batchData.length===0?emptyState('🏢','No programs yet',isAdmin?'Create Corporate Fitness programs.':'No programs assigned yet.',isAdmin?'+ Create Program':'',isAdmin?'openCreateBatch()':'')
      :batchData.map(b=>{const enrolled=b.enrolledClients||[];const maxCap=b.maxCapacity||10;const isFull=enrolled.length>=maxCap;return`<div class="batch-card"><div class="batch-header"><div><div class="batch-name">🏢 ${b.batchName}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">Trainer: ${b.trainerName||'—'} | ${b.schedule||'—'}</div>${b.company?`<div style="font-size:12px;color:var(--orange)">🏢 ${b.company}</div>`:''}</div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="badge ${isFull?'b-r':'b-g'}">${enrolled.length}/${maxCap} ${isFull?'Full':'Open'}</span>${planBadge(b.plan)}${isAdmin?`<button class="btn btn-g btn-sm" onclick="openEditBatch('${b.id}')">Edit</button><button class="btn btn-d btn-sm" onclick="delBatch('${b.id}')">Delete</button>`:''}</div></div><div class="batch-clients">${enrolled.map(uid=>{const c=clients.find(cl=>cl.id===uid)||{};return`<span class="batch-client-tag">${c.name||uid.substring(0,8)+'…'}</span>`}).join('')}</div>${isAdmin?`<div style="margin-top:10px"><button class="btn btn-pu btn-sm" onclick="addClientToBatch('${b.id}','${(b.batchName).replace(/'/g,"\\'")}')">+ Add Client</button></div>`:''}</div>`;}).join('')}
    </div>`;
}
async function openCreateBatch(){
  const trainers=await fsGetAll('users',fn().where('role','==','trainer'));
  const clients=await fsGetAll('clients',fn().where('active','==',true));
  openM2('CREATE CORPORATE FITNESS PROGRAM',`
    <div class="fr">
      <div class="fg"><label class="fl">Program Name *</label><input class="fi" id="bf-name" placeholder="e.g. Morning Warriors"></div>
      <div class="fg"><label class="fl">Plan Type</label><select class="fs" id="bf-plan"><option value="">— Select —</option>${PLANS.map(p=>`<option>${p}</option>`).join('')}</select></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Assign Trainer</label><select class="fs" id="bf-trainer"><option value="">— Select —</option>${trainers.map(t=>`<option value="${t.id}" data-gender="${t.gender||''}">${t.name||t.email} (${t.gender||'Any'})</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Session Type</label><select class="fs" id="bf-stype">${SESSION_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>

    <div class="fr">
      <div class="fg"><label class="fl">Company Name</label><input class="fi" id="bf-company" placeholder="Optional"></div>
      <div class="fg"><label class="fl">Max Capacity</label><input class="fi" id="bf-cap" type="number" value="10" min="1" max="50"></div>
    </div>
    <div class="fg"><label class="fl">Schedule / Time *</label><input class="fi" id="bf-schedule" placeholder="e.g. Mon/Wed/Fri 6:00 – 7:00 AM"></div>
    <div class="fg"><label class="fl">Pre-enroll Clients</label><select class="fs" id="bf-clients" multiple style="height:90px">${clients.map(c=>`<option value="${c.id}">${c.name} (${c.plan||'—'})</option>`).join('')}</select></div>
    <div id="bf-err" class="alert alert-err"></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM2()">Cancel</button><button class="btn btn-p" onclick="saveBatch('')">Create</button></div>`);

async function openEditBatch(id){
  const b=await fsGet('batches',id);if(!b){toast('Not found','error');return}
  const trainers=await fsGetAll('users',fn().where('role','==','trainer'));
  openM1('EDIT PROGRAM',`
    <div class="fg"><label class="fl">Program Name *</label><input class="fi" id="bf-name" value="${b.batchName||''}"></div>
    <div class="fg"><label class="fl">Assign Trainer</label><select class="fs" id="bf-trainer"><option value="">— Select —</option>${trainers.map(t=>`<option value="${t.id}" data-gender="${t.gender||''}" ${b.trainerId===t.id?'selected':''}>${t.name||t.email} (${t.gender||'Any'})</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Session Type</label><select class="fs" id="bf-stype">${SESSION_TYPES.map(t=>`<option ${b.sessionType===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Schedule</label><input class="fi" id="bf-schedule" value="${b.schedule||''}"></div>
    <div class="fg"><label class="fl">Max Capacity</label><input class="fi" id="bf-cap" type="number" value="${b.maxCapacity||10}"></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM1()">Cancel</button><button class="btn btn-p" onclick="saveBatch('${id}')">Update</button></div>`);
}
async function saveBatch(existingId=''){
  const nameEl=document.getElementById('bf-name');const name=nameEl?nameEl.value.trim():'';
  if(!name){toast('Program name required','error');return}
  const trainerSel=$('bf-trainer');const trainerId=trainerSel?trainerSel.value:'';
  const trainerOpt=trainerSel&&trainerSel.selectedIndex>0?trainerSel.options[trainerSel.selectedIndex]:null;
  const trainerName=trainerOpt?trainerOpt.text.replace(/\s*\([^)]*\)\s*$/,'').trim():'';
  const schedule=document.getElementById('bf-schedule')?.value.trim()||'';
  const maxCap=Number(document.getElementById('bf-cap')?.value)||10;
  const sessionType=document.getElementById('bf-stype')?.value||'Corporate Fitness';
  const plan=document.getElementById('bf-plan')?.value||'';
  const company=document.getElementById('bf-company')?.value.trim()||'';
  const clientsSel=document.getElementById('bf-clients');
  const preEnrolled=clientsSel?Array.from(clientsSel.selectedOptions).map(o=>o.value).filter(v=>v):[];
  const existingBatch=existingId?await fsGet('batches',existingId):null;
  const mergedEnrolled=[...new Set([...(existingBatch?.enrolledClients||[]),...preEnrolled])];
  const data={batchName:name,trainerId,trainerName,sessionType,schedule,maxCapacity:maxCap,company,plan,enrolledClients:mergedEnrolled};
  try{
    if(existingId){await fsUpdate('batches',existingId,data);toast('Updated!','success');closeM1()}
    else{await fsAdd('batches',data);toast('Created!','success');closeM2()}
    batches();
  }catch(e){toast('Error: '+e.message,'error')}
}
async function addClientToBatch(batchId,batchName){
  const clients=await fsGetAll('clients',fn().where('active','==',true));
  const b=await fsGet('batches',batchId);const already=b?.enrolledClients||[];
  const available=clients.filter(c=>!already.includes(c.id));
  openM1(`ADD CLIENT TO: ${batchName.toUpperCase()}`,`
    <div class="fg"><label class="fl">Select Client *</label><select class="fs" id="atb-client"><option value="">— Select —</option>${available.map(c=>`<option value="${c.id}">${c.name} (${c.plan||'—'})</option>`).join('')}</select></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM1()">Cancel</button><button class="btn btn-p" onclick="saveAddClientToBatch('${batchId}')">Add</button></div>`);
}
async function saveAddClientToBatch(batchId){
  const clientSel=$('atb-client');const clientId=clientSel.value;
  if(!clientId){toast('Select a client','error');return}
  try{const b=await fsGet('batches',batchId);const enrolled=b?.enrolledClients||[];if(enrolled.includes(clientId)){toast('Already enrolled','info');return}if(enrolled.length>=(b?.maxCapacity||10)){toast('At max capacity','error');return}await fn().updateDoc(fn().doc(db(),'batches',batchId),{enrolledClients:[...enrolled,clientId]});closeM1();toast('Client added!','success');batches()}catch(e){toast('Error: '+e.message,'error')}
}
async function delBatch(id){if(!confirm('Delete?'))return;try{await fsDel('batches',id);toast('Deleted','success');batches()}catch(e){toast('Error','error')}}

// ── BADGE HELPERS ─────────────────────────────────────────────
function statusBadge(s){
  const map={onair:`<span class="badge b-g"><span class="dot dot-g"></span>On Air</span>`,'not-started':`<span class="badge b-y"><span class="dot dot-y"></span>Pending</span>`,missed:`<span class="badge b-r"><span class="dot dot-r"></span>Missed</span>`,completed:`<span class="badge b-gray">✓ Done</span>`,present:`<span class="badge b-g">✅ Present</span>`,absent:`<span class="badge b-r">❌ Absent</span>`,late:`<span class="badge b-y">⏰ Late</span>`};
  return map[s]||`<span class="badge b-gray">${s||'—'}</span>`;
}
function planBadge(p){
  if(!p)return`<span class="badge b-gray">—</span>`;
  if(p==='Gold')return`<span class="badge b-y">🥇 Gold</span>`;
  if(p==='Platinum')return`<span class="badge b-p">💎 Platinum</span>`;
  if(p==='Platinum Plus')return`<span class="badge b-p">💎+ Plat+</span>`;
  if(p==='Corporate Fitness')return`<span class="badge b-b">🏢 Corporate</span>`;
  return`<span class="badge b-gray">🥈 Silver</span>`;
}

// ── FIREBASE INIT ─────────────────────────────────────────────
document.addEventListener('fbReady',()=>{
  initTheme();
  const{onAuthStateChanged}=window.FN;
  onAuthStateChanged(window.FB.auth,async user=>{
    await new Promise(r=>setTimeout(r,1600));
    $('loader').classList.add('out');
    if(user){
      try{
        const uDoc=await fsGet('users',user.uid);
        if(uDoc&&uDoc.role){CU=uDoc;CR=uDoc.role;startApp()}
        else{await window.FN.signOut(window.FB.auth);$('login-page').style.display='flex'}
      }catch(e){$('login-page').style.display='flex'}
    }else{$('login-page').style.display='flex'}
  });
});
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&$('login-page').style.display==='flex')doLogin()});
</script>
